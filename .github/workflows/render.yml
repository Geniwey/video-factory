name: Render Short Video Viral

on:
  repository_dispatch:
    types: [render-video]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
          pip install --quiet openai-whisper edge-tts
          mkdir -p ~/.fonts && wget -q -O ~/.fonts/Montserrat-Black.ttf "https://github.com/google/fonts/raw/main/ofl/montserrat/static/Montserrat-Black.ttf" || true
          fc-cache -f

      - name: Assets
        run: |
          curl -L -f -o ia_img.jpg "$(echo "${{ github.event.client_payload.image_url }}" | tr -d '\r\n" ')"
          curl -L -f -o pexels.mp4 "$(echo "${{ github.event.client_payload.video_url }}" | tr -d '\r\n" ')"
          echo "${{ github.event.client_payload.script_text }}" > script.txt
          edge-tts --voice "es-ES-AlvaroNeural" --rate="+5%" --file script.txt --write-media audio.mp3
          ffmpeg -y -i audio.mp3 -acodec pcm_s16le -ar 44100 -ac 1 audio.wav
          DURATION=$(ffprobe -v quiet -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 audio.wav)
          echo "$DURATION" > dur.txt

      - name: Subtitles
        run: |
          whisper audio.wav --model small --language es --output_format json --word_timestamps True --output_dir . 2>/dev/null
          cat << 'EOF' > gen_subs.py
          import json, os
          with open("audio.json") as f: data = json.load(f)
          words = [w for s in data.get("segments",[]) for w in s.get("words",[]) if w.get("word","").strip()]
          h = "[Script Info]\nScriptType: v4.00+\nPlayResX: 1080\nPlayResY: 1920\n\n[V4+ Styles]\nFormat: Name, Fontname, Fontsize, PrimaryColour, SecondaryColour, OutlineColour, BackColour, Bold, Italic, Underline, StrikeOut, ScaleX, ScaleY, Spacing, Angle, BorderStyle, Outline, Shadow, Alignment, MarginL, MarginR, MarginV, Encoding\nStyle: Default,Montserrat Black,85,&H00FFFFFF,&H0000D7FF,&H00000000,&HBB000000,-1,0,0,0,100,100,0,0,1,4,2,2,60,60,500,1\n\n[Events]\nFormat: Layer, Start, End, Style, Name, MarginL, MarginR, MarginV, Effect, Text\n"
          def fmt(s): return f"{int(s//3600)}:{int((s%3600)//60):02d}:{int(s%60):02d}.{min(int(round((s%1)*100)), 99):02d}"
          lines = []
          for i in range(0, len(words), 3):
              chunk = words[i:i+3]
              for j, cw in enumerate(chunk):
                  p = [f"{{\\c&H0000D7FF\\fscx115\\fscy115}}{w['word'].strip().upper()}{{\\c&H00FFFFFF\\fscx100\\fscy100}}" if k==j else w['word'].strip().upper() for k,w in enumerate(chunk)]
                  lines.append(f"Dialogue: 0,{fmt(cw['start'])},{fmt(cw['end'])},Default,,0,0,0,,{' '.join(p)}")
          with open("subtitles.ass","w") as f: f.write(h + "\n".join(lines))
          EOF
          python3 gen_subs.py

      - name: Render Final
        run: |
          DUR=$(cat dur.txt)
          # VÍDEO VIRAL: Fondo de neón moviéndose + Imagen IA encima nítida (sin temblores)
          ffmpeg -y -stream_loop -1 -i pexels.mp4 -i ia_img.jpg -i audio.wav -filter_complex \
          "[0:v]scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,setsar=1[bg]; \
           [1:v]scale=800:800:force_original_aspect_ratio=decrease,pad=800:800:(ow-iw)/2:(oh-ih)/2:black@0,format=rgba[img]; \
           [bg][img]overlay=(W-w)/2:300[mixed]; \
           [mixed]ass=subtitles.ass[subs]; \
           [subs]drawbox=x=0:y=0:w='iw*t/${DUR}':h=10:color=0xFFD700@0.9:t=fill[final]" \
          -map "[final]" -map 2:a -c:v libx264 -preset fast -crf 20 -pix_fmt yuv420p -t "$DUR" output.mp4

      - name: Upload
        run: |
          URL=$(curl -f -F "reqtype=fileupload" -F "time=24h" -F "fileToUpload=@output.mp4" "https://litterbox.catbox.moe/resources/internals/api.php")
          echo "VÍDEO VIRAL LISTO: $URL"
