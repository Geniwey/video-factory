name: Dato Critico - Produccion y Distribucion

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONIOENCODING: utf-8
  LANG: C.UTF-8
  LC_ALL: C.UTF-8

on:
  repository_dispatch:
    types: [render-video]

permissions:
  contents: write
  actions: write
  id-token: write

jobs:
  render-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      # ============================================
      # 🛠️ PASO 1: SETUP
      # ============================================
      - name: Setup
        timeout-minutes: 5
        run: |
          echo "🧹 Limpiando repositorios problemáticos..."
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list 2>/dev/null || true
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list 2>/dev/null || true
          sudo rm -f /etc/apt/sources.list.d/vscode.list 2>/dev/null || true
          
          echo "📦 Actualizando repositorios..."
          sudo apt-get update -qq 2>&1 | grep -v "Failed to fetch" || true
          
          echo "⚙️ Instalando dependencias del sistema..."
          sudo apt-get install -y -qq \
            ffmpeg bc file xvfb chromium-browser chromium-chromedriver \
            fonts-liberation libnss3 libatk-bridge2.0-0 libgbm1 \
            2>&1 | grep -v "debconf: unable to initialize frontend" || true
          
          echo "🐍 Instalando librerías Python..."
          pip install --quiet --upgrade pip 2>/dev/null
          pip install --quiet openai-whisper edge-tts requests google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client 2>/dev/null
          
          echo "🔤 Configurando fuentes..."
          mkdir -p ~/.fonts
          wget -q -O ~/.fonts/Montserrat-Black.ttf "https://github.com/google/fonts/raw/main/ofl/montserrat/static/Montserrat-Black.ttf" 2>/dev/null || true
          fc-cache -f 2>/dev/null

      # ============================================
      # 📝 PASO 2: EXTRACCIÓN Y LIMPIEZA UTF-8 (FUERZA BRUTA)
      # ============================================
      - name: Extraer Textos y Reparar UTF-8
        timeout-minutes: 2
        run: |
          cat << 'PYTHON_EXTRACT' > extraer_textos.py
          import json
          import os
          import sys

          # Forzar UTF-8 en la salida de Python
          sys.stdout.reconfigure(encoding='utf-8')
          
          event_path = os.environ.get('GITHUB_EVENT_PATH')
          
          try:
              # Leemos el JSON crudo forzando UTF-8
              with open(event_path, 'r', encoding='utf-8') as f:
                  event_data = json.load(f)
          except Exception as e:
              print(f"❌ Error leyendo el JSON del evento: {e}")
              event_data = {}
              
          payload = event_data.get('client_payload', {})
          
          # Extracción segura con fallbacks
          titulo = payload.get('titulo') or 'Noticia Tecnológica 🚀'
          descripcion = payload.get('descripcion') or '#tecnologia #shorts'
          script_text = payload.get('script_text') or 'Lo que acaba de pasar en tecnologia va a cambiar todo.'
          
          # Función para reparar caracteres rotos si Github los ha masticado
          def reparar_texto(texto):
              if not isinstance(texto, str):
                  return str(texto)
              # Intentar arreglar si viene con codificación doble o mala
              try:
                  return texto.encode('latin1').decode('utf-8')
              except:
                  return texto # Si falla, devolver tal cual
                  
          titulo_limpio = reparar_texto(titulo)
          descripcion_limpia = reparar_texto(descripcion)
          script_limpio = reparar_texto(script_text)

          # Guardar forzando UTF-8 puro
          with open('titulo.txt', 'w', encoding='utf-8') as f:
              f.write(titulo_limpio.strip()[:85])
              
          with open('descripcion.txt', 'w', encoding='utf-8') as f:
              f.write(descripcion_limpia.strip()[:4500])
              
          with open('script.txt', 'w', encoding='utf-8') as f:
              f.write(script_limpio.strip()[:5000])
              
          print("✅ Textos extraídos y reparados correctamente")
          PYTHON_EXTRACT
          
          python3 extraer_textos.py

      # ============================================
      # 📥 PASO 3: PREPARAR ASSETS (AUDIO Y VÍDEO)
      # ============================================
      - name: Download and prepare assets
        timeout-minutes: 5
        run: |
          set +e
          VIDEO_URL=$(cat $GITHUB_EVENT_PATH | jq -r '.client_payload.video_url // empty')
          
          if [ -n "$VIDEO_URL" ]; then
            curl -L -f -A "Mozilla/5.0" --connect-timeout 20 -o pexels.mp4 "$VIDEO_URL" 2>/dev/null
          fi

          if [ ! -s "pexels.mp4" ]; then
            ffmpeg -y -f lavfi -i "color=c=0x0a0e27:s=1080x1920:d=60:r=30" -vf "vignette=PI/2.5,noise=alls=4:allf=t,eq=brightness=-0.05:contrast=1.2" -c:v libx264 -preset ultrafast -crf 28 -t 60 pexels.mp4 2>/dev/null || true
          fi

          edge-tts --voice "es-ES-AlvaroNeural" --rate="+5%" --pitch="-3Hz" --file script.txt --write-media audio.mp3 2>/dev/null || true

          if [ -s "audio.mp3" ]; then
            ffmpeg -y -i audio.mp3 -acodec pcm_s16le -ar 44100 -ac 1 audio.wav 2>/dev/null || true
          fi

          if [ ! -s "audio.wav" ]; then
            ffmpeg -y -f lavfi -i anullsrc=r=44100:cl=mono -t 5 -c:a pcm_s16le audio.wav 2>/dev/null || true
          fi

          DURATION=$(ffprobe -v quiet -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 audio.wav 2>/dev/null || echo "5")
          [ -z "$DURATION" ] || [ "$DURATION" = "N/A" ] && DURATION="5"
          echo "$DURATION" > dur.txt

      # ============================================
      # 💬 PASO 4: GENERAR SUBTÍTULOS
      # ============================================
      - name: Generate subtitles
        timeout-minutes: 8
        run: |
          set +e
          timeout 7m whisper audio.wav --model small --language es --output_format json --word_timestamps True --output_dir . 2>/dev/null || true

          cat << 'PYEOF' > gen_subs.py
          import json, os

          def escape_ass(text):
              return (text.replace("\\", "\\\\").replace("{", "\\{").replace("}", "\\}").replace("\n", "\\N"))

          def generate():
              if not os.path.exists("audio.json"): return False
              
              try:
                  try:
                      with open("audio.json", encoding="utf-8") as f: data = json.load(f)
                  except UnicodeDecodeError:
                      with open("audio.json", encoding="latin-1") as f: data = json.load(f)
              except json.JSONDecodeError:
                  return False

              words = []
              for seg in data.get("segments", []):
                  for w in seg.get("words", []):
                      word_text = w.get("word", "").strip()
                      if word_text and len(word_text) > 1 and word_text.isalpha():
                          words.append(w)
              if len(words) < 2: return False

              header = "[Script Info]\nScriptType: v4.00+\nPlayResX: 1080\nPlayResY: 1920\n\n[V4+ Styles]\nFormat: Name, Fontname, Fontsize, PrimaryColour, SecondaryColour, OutlineColour, BackColour, Bold, Italic, Underline, StrikeOut, ScaleX, ScaleY, Spacing, Angle, BorderStyle, Outline, Shadow, Alignment, MarginL, MarginR, MarginV, Encoding\nStyle: Default,Montserrat Black,90,&H00FFFFFF,&H0000D7FF,&H00000000,&HBB000000,-1,0,0,0,100,100,0,0,1,4,2,2,60,60,700,1\n\n[Events]\nFormat: Layer, Start, End, Style, Name, MarginL, MarginR, MarginV, Effect, Text\n"

              def fmt(s, offset=0.0):
                  s = max(0, s + offset)
                  h, m, sec, cs = int(s//3600), int((s%3600)//60), int(s%60), min(int(round((s%1)*100)), 99)
                  return f"{h}:{m:02d}:{sec:02d}.{cs:02d}"

              lines = []
              for i in range(0, len(words), 3):
                  chunk = words[i:i+3]
                  if not chunk: continue
                  for j, cw in enumerate(chunk):
                      parts = []
                      for k, w in enumerate(chunk):
                          clean = escape_ass(w["word"].strip().upper())
                          if k == j: parts.append("{\\c&H0000D7FF\\fscx115\\fscy115}" + clean + "{\\c&H00FFFFFF\\fscx100\\fscy100}")
                          else: parts.append(clean)
                      lines.append(f"Dialogue: 0,{fmt(cw['start'], -0.15)},{fmt(cw['end'], 0.15)},Default,,0,0,0,,{' '.join(parts)}")

              with open("subtitles.ass", "w", encoding="utf-8") as f:
                  f.write(header + "\n".join(lines) + "\n")
              return True

          try:
              if not generate(): raise Exception("Fallback")
          except:
              fallback = "[Script Info]\nScriptType: v4.00+\nPlayResX: 1080\nPlayResY: 1920\n\n[V4+ Styles]\nFormat: Name, Fontname, Fontsize, PrimaryColour, SecondaryColour, OutlineColour, BackColour, Bold, Italic, Underline, StrikeOut, ScaleX, ScaleY, Spacing, Angle, BorderStyle, Outline, Shadow, Alignment, MarginL, MarginR, MarginV, Encoding\nStyle: Default,Montserrat,80,&H00FFFFFF,&H0000D7FF,&H00000000,&HBB000000,-1,0,0,0,100,100,0,0,1,4,2,2,60,60,700,1\n\n[Events]\nFormat: Layer, Start, End, Style, Name, MarginL, MarginR, MarginV, Effect, Text\nDialogue: 0,0:00:00.00,0:00:05.00,Default,,0,0,0,,\n"
              with open("subtitles.ass", "w", encoding="utf-8") as f: f.write(fallback)
          PYEOF
          python3 gen_subs.py

      # ============================================
      # 🎬 PASO 5: RENDERIZAR VIDEO FINAL
      # ============================================
      - name: Render final video
        timeout-minutes: 10
        run: |
          set +e
          DUR=$(cat dur.txt)
          SAFE_DUR=$(printf '%.2f' "$DUR")

          file -bi subtitles.ass | grep -q "utf-8" || iconv -f ISO-8859-1 -t UTF-8 subtitles.ass > subtitles_tmp.ass && mv subtitles_tmp.ass subtitles.ass
          printf '\xef\xbb\xbf' > subtitles_bom.ass && cat subtitles.ass >> subtitles_bom.ass && mv subtitles_bom.ass subtitles.ass

          ffmpeg -y -stream_loop -1 -i pexels.mp4 -i audio.wav \
            -filter_complex "[0:v]scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,setsar=1,eq=brightness=-0.08:saturation=1.1[bg];[bg]subtitles=subtitles.ass:force_style='FontName=Montserrat Black'[subs];[subs]drawbox=x=0:y=0:w='min(iw\,iw*t/${SAFE_DUR})':h=10:color=0xFFD700@0.9:t=fill[final]" \
            -map "[final]" -map 1:a -c:v libx264 -preset fast -crf 23 -pix_fmt yuv420p -c:a aac -b:a 192k -t "$DUR" output.mp4 2>/dev/null || true

          if [ ! -s "output.mp4" ]; then
            ffmpeg -y -f lavfi -i "color=c=0x0a0e27:s=1080x1920:d=${DUR}:r=30" -i audio.wav -c:v libx264 -preset ultrafast -t "$DUR" output.mp4 2>/dev/null || true
          fi
          
          if [ ! -s "output.mp4" ]; then
            echo "❌ ERROR CRÍTICO: No se pudo generar el video"
            exit 1
          fi

      # ============================================
      # 📺 PASO 6: PUBLICAR EN YOUTUBE
      # ============================================
      - name: Publicar en YouTube
        id: youtube
        continue-on-error: true
        timeout-minutes: 10
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          cat << 'PYTHON_YT' > publicar_youtube.py
          import os, sys
          from google.auth.transport.requests import Request
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          def upload():
              client_id = os.environ.get('YOUTUBE_CLIENT_ID')
              client_secret = os.environ.get('YOUTUBE_CLIENT_SECRET')
              refresh_token = os.environ.get('YOUTUBE_REFRESH_TOKEN')
              if not all([client_id, client_secret, refresh_token]): sys.exit(1)
              
              token_data = {'token': 'dummy', 'refresh_token': refresh_token, 'token_uri': 'https://oauth2.googleapis.com/token', 'client_id': client_id, 'client_secret': client_secret, 'scopes': ['https://www.googleapis.com/auth/youtube.upload']}
              creds = Credentials.from_authorized_user_info(token_data, token_data['scopes'])
              
              try:
                  if creds and creds.expired and creds.refresh_token: creds.refresh(Request())
              except Exception as e:
                  print("❌ Error de Token YT"); sys.exit(1)
                  
              youtube = build('youtube', 'v3', credentials=creds)
              
              titulo = open('titulo.txt', encoding='utf-8', errors='replace').read().strip()
              descripcion = open('descripcion.txt', encoding='utf-8', errors='replace').read().strip()
              
              req = youtube.videos().insert(
                  part='snippet,status',
                  body={'snippet': {'categoryId': '28', 'title': titulo, 'description': descripcion, 'tags': ['tecnologia', 'shorts', 'ia', 'noticias']}, 'status': {'privacyStatus': 'public'}},
                  media_body=MediaFileUpload('output.mp4', resumable=True)
              ).execute()
              
              open('youtube_id.txt', 'w').write(req['id'])
          
          try: upload()
          except Exception: sys.exit(1)
          PYTHON_YT
          python3 publicar_youtube.py && echo "youtube_status=✅ OK" >> $GITHUB_OUTPUT || echo "youtube_status=❌ Fallo" >> $GITHUB_OUTPUT

      # ============================================
      # 🎵 PASO 7: PUBLICAR EN TIKTOK
      # ============================================
      - name: Publicar en TikTok
        id: tiktok
        continue-on-error: true
        timeout-minutes: 10
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          cat << 'PYTHON_TK' > publicar_tk.py
          import os, sys, requests, subprocess
          def upload():
              client_key = os.environ.get("TIKTOK_CLIENT_KEY")
              client_secret = os.environ.get("TIKTOK_CLIENT_SECRET")
              refresh_token = os.environ.get("TIKTOK_REFRESH_TOKEN")
              if not all([client_key, client_secret, refresh_token]): return False
              
              try:
                  res = requests.post("https://open.tiktokapis.com/v2/oauth/token/", data={"client_key": client_key, "client_secret": client_secret, "grant_type": "refresh_token", "refresh_token": refresh_token}, timeout=30).json()
                  access_token = res.get("data", {}).get("access_token")
                  if not access_token: return False
                  subprocess.run(["gh", "secret", "set", "TIKTOK_ACCESS_TOKEN", "-b", access_token], check=False)
              except: return False

              t = open('titulo.txt', encoding='utf-8', errors='replace').read().strip()
              d = open('descripcion.txt', encoding='utf-8', errors='replace').read().strip()
              caption = f"{t}\n{d}"[:150]
              
              size = os.path.getsize("output.mp4")
              
              init = requests.post("https://open.tiktokapis.com/v2/post/publish/video/init/", headers={"Authorization": f"Bearer {access_token}", "Content-Type": "application/json; charset=UTF-8"}, json={"post_info": {"title": caption, "privacy_level": "PUBLIC_TO_EVERYONE"}, "source_info": {"source": "FILE_UPLOAD", "video_size": size, "chunk_size": size, "total_chunk_count": 1}}, timeout=60).json()
              if "data" not in init: return False
              
              upload_url = init["data"]["upload_url"]
              up = requests.put(upload_url, headers={"Content-Type": "video/mp4", "Content-Length": str(size)}, data=open("output.mp4", "rb").read(), timeout=300)
              return up.status_code in [200, 201]
              
          sys.exit(0 if upload() else 1)
          PYTHON_TK
          python3 publicar_tk.py && echo "tiktok_status=✅ OK" >> $GITHUB_OUTPUT || echo "tiktok_status=❌ Fallo" >> $GITHUB_OUTPUT

      # ============================================
      # 📷 PASO 8: INSTAGRAM
      # ============================================
      - name: Publicar en Instagram
        id: instagram
        continue-on-error: true
        timeout-minutes: 15
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
        run: |
          cat << 'PYTHON_IG' > publicar_ig.py
          import os, sys, requests, time
          def upload():
              token = os.environ.get("INSTAGRAM_ACCESS_TOKEN")
              uid = os.environ.get("INSTAGRAM_USER_ID")
              if not token or not uid: return False
              
              url = None
              for srv in [{'u':'https://litterbox.catbox.moe/resources/internals/api.php', 'd':{'reqtype':'fileupload','time':'12h'}, 'f':'fileToUpload'}, {'u':'https://tmpfiles.org/api/v1/upload', 'd':None, 'f':'file'}]:
                  try:
                      r = requests.post(srv['u'], data=srv['d'], files={srv['f']: open('output.mp4', 'rb')}, timeout=120)
                      if r.status_code == 200:
                          if 'catbox' in srv['u']: url = r.text.strip()
                          else: url = r.json()['data']['url'].replace('tmpfiles.org/', 'tmpfiles.org/dl/')
                          if url.startswith('http'): break
                  except: continue
              
              if not url: return False
              
              t = open('titulo.txt', encoding='utf-8', errors='replace').read().strip()
              d = open('descripcion.txt', encoding='utf-8', errors='replace').read().strip()
              caption = f"{t}\n{d}"[:2200]
              
              base = f"https://graph.instagram.com/v21.0/{uid}"
              
              r = requests.post(f"{base}/media", data={'media_type':'REELS', 'video_url':url, 'caption':caption, 'access_token':token}, timeout=120).json()
              if 'id' not in r: return False
              cid = r['id']
              
              for _ in range(30):
                  time.sleep(10)
                  s = requests.get(f"https://graph.instagram.com/v21.0/{cid}", params={'fields':'status_code', 'access_token':token}, timeout=30).json()
                  if s.get('status_code') == 'FINISHED': break
                  if s.get('status_code') == 'ERROR': return False
              else: return False
              
              p = requests.post(f"{base}/media_publish", data={'creation_id':cid, 'access_token':token}, timeout=60).json()
              return 'id' in p

          sys.exit(0 if upload() else 1)
          PYTHON_IG
          python3 publicar_ig.py && echo "instagram_status=✅ OK" >> $GITHUB_OUTPUT || echo "instagram_status=❌ Fallo" >> $GITHUB_OUTPUT

      # ============================================
      # 📲 PASO 9: NOTIFICAR VÍA TELEGRAM
      # ============================================
      - name: Notificar a Telegram
        if: always()
        timeout-minutes: 2
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TITULO=$(python3 -c "print(open('titulo.txt', encoding='utf-8', errors='replace').read().strip()[:50])" 2>/dev/null || echo "Sin título")
          TITULO_CLEAN=$(echo "$TITULO" | sed 's/[_*[\]()~`>#+=|{}.!-]//g')
          
          YT_STATUS="${{ steps.youtube.outputs.youtube_status || '⚠️ No ejecutado' }}"
          TK_STATUS="${{ steps.tiktok.outputs.tiktok_status || '⚠️ No ejecutado' }}"
          IG_STATUS="${{ steps.instagram.outputs.instagram_status || '⚠️ No ejecutado' }}"
          
          MENSAJE="🤖 *Publicación*%0A📹 ${TITULO_CLEAN}%0A%0AYouTube: ${YT_STATUS}%0ATikTok: ${TK_STATUS}%0AInstagram: ${IG_STATUS}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" -d chat_id="${TELEGRAM_CHAT_ID}" -d text="$MENSAJE" -d parse_mode="Markdown" -d disable_web_page_preview=true || true
