name: Render Short Video

on:
  repository_dispatch:
    types: [render-video]

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg bc file
          pip install --quiet openai-whisper edge-tts
          mkdir -p ~/.fonts
          wget -q -O ~/.fonts/Montserrat-Black.ttf \
            "https://github.com/google/fonts/raw/main/ofl/montserrat/static/Montserrat-Black.ttf" || true
          fc-cache -f
          echo "OK"

      - name: Download assets
        run: |
          set +e

          download() {
            local url=$(echo "$1" | tr -d '\r\n" ' | sed 's/^null$//i' | sed 's/^undefined$//i')
            [ -z "$url" ] && echo "Sin URL para $2" && return 1
            echo "Descargando $2..."
            curl -L -f -A "Mozilla/5.0" --connect-timeout 20 --max-time 120 -o "$2" "$url" 2>/dev/null || return 1
            [ -s "$2" ] || return 1
            mime=$(file -b --mime-type "$2" 2>/dev/null)
            echo "  $mime $(wc -c < "$2") bytes"
            echo "$mime" | grep -q "text/html" && rm -f "$2" && return 1
            return 0
          }

          download "${{ github.event.client_payload.image_url }}" "ia_img.jpg" \
            && echo "HAS_IMAGE=true" >> $GITHUB_ENV \
            || echo "HAS_IMAGE=false" >> $GITHUB_ENV

          download "${{ github.event.client_payload.video_url }}" "pexels.mp4" \
            && echo "HAS_BG=true" >> $GITHUB_ENV \
            || echo "HAS_BG=false" >> $GITHUB_ENV

          download "${{ github.event.client_payload.audio_url }}" "audio_ext" \
            && echo "HAS_AUDIO=true" >> $GITHUB_ENV \
            || echo "HAS_AUDIO=false" >> $GITHUB_ENV

          exit 0

      - name: Audio
        run: |
          set +e

          if [ "${{ env.HAS_AUDIO }}" = "true" ] && [ -s "audio_ext" ]; then
            ffmpeg -y -i audio_ext -acodec pcm_s16le -ar 44100 -ac 1 audio.wav 2>/dev/null
          fi

          if [ ! -s "audio.wav" ]; then
            TEXTO="${{ github.event.client_payload.script_text }}"
            if [ -z "$TEXTO" ]; then
              TEXTO="Contenido de tecnologia importante"
            fi
            echo "$TEXTO" | head -c 5000 > /tmp/script.txt
            edge-tts \
              --voice "es-ES-AlvaroNeural" \
              --rate="+5%" \
              --pitch="-3Hz" \
              --file /tmp/script.txt \
              --write-media temp.mp3 2>/dev/null || true
            [ -s "temp.mp3" ] && ffmpeg -y -i temp.mp3 -acodec pcm_s16le -ar 44100 -ac 1 audio.wav 2>/dev/null
          fi

          if [ ! -s "audio.wav" ]; then
            ffmpeg -y -f lavfi -i anullsrc=r=44100:cl=mono -t 5 -c:a pcm_s16le audio.wav 2>/dev/null
          fi

          DURATION=$(ffprobe -v quiet -show_entries format=duration \
            -of default=noprint_wrappers=1:nokey=1 audio.wav 2>/dev/null || echo "5")
          [ -z "$DURATION" ] || [ "$DURATION" = "N/A" ] && DURATION="5"
          echo "$DURATION" > /tmp/dur.txt
          echo "Audio: ${DURATION}s"
          exit 0

      - name: Prepare background
        run: |
          set +e
          DURATION=$(cat /tmp/dur.txt)

          if [ "${{ env.HAS_BG }}" = "true" ] && [ -s "pexels.mp4" ]; then
            ffmpeg -y -stream_loop -1 -i pexels.mp4 \
              -vf "scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,setsar=1" \
              -c:v libx264 -preset fast -crf 23 -pix_fmt yuv420p \
              -t "$DURATION" bg.mp4 2>/dev/null
            [ -s "bg.mp4" ] && echo "Fondo Pexels OK" && echo "HAS_BG_READY=true" >> $GITHUB_ENV && exit 0
          fi

          echo "Generando fondo oscuro..."
          ffmpeg -y -f lavfi \
            -i "color=c=0x0a0e27:s=1080x1920:d=${DURATION}:r=30" \
            -vf "vignette=PI/2.5,noise=alls=3:allf=t" \
            -c:v libx264 -preset ultrafast -crf 28 -pix_fmt yuv420p \
            -t "$DURATION" bg.mp4 2>/dev/null || true
          echo "HAS_BG_READY=true" >> $GITHUB_ENV
          exit 0

      - name: Prepare image overlay
        run: |
          set +e

          if [ "${{ env.HAS_IMAGE }}" = "true" ] && [ -s "ia_img.jpg" ]; then
            echo "Preparando imagen IA como overlay..."

            ffmpeg -y -i ia_img.jpg \
              -vf "scale=700:-1:force_original_aspect_ratio=decrease,pad=720:720:(ow-iw)/2:(oh-ih)/2:black@0,format=rgba" \
              ia_overlay.png 2>/dev/null

            if [ -s "ia_overlay.png" ]; then
              echo "Imagen overlay lista"
              echo "HAS_OVERLAY=true" >> $GITHUB_ENV
            else
              echo "HAS_OVERLAY=false" >> $GITHUB_ENV
            fi
          else
            echo "HAS_OVERLAY=false" >> $GITHUB_ENV
          fi
          exit 0

      - name: Subtitles
        run: |
          set +e

          whisper audio.wav --model small --language es \
            --output_format json --word_timestamps True \
            --output_dir . 2>/dev/null || true

          cat << 'PYEOF' > gen_subs.py
          import json, os

          def gen():
              if not os.path.exists("audio.json"):
                  return False
              with open("audio.json") as f:
                  data = json.load(f)
              words = [w for s in data.get("segments",[]) for w in s.get("words",[]) if w.get("word","").strip()]
              if len(words) < 2:
                  return False

              header = "[Script Info]\n"
              header += "ScriptType: v4.00+\n"
              header += "PlayResX: 1080\n"
              header += "PlayResY: 1920\n\n"
              header += "[V4+ Styles]\n"
              header += "Format: Name, Fontname, Fontsize, PrimaryColour, SecondaryColour, OutlineColour, BackColour, Bold, Italic, Underline, StrikeOut, ScaleX, ScaleY, Spacing, Angle, BorderStyle, Outline, Shadow, Alignment, MarginL, MarginR, MarginV, Encoding\n"
              header += "Style: Default,Montserrat Black,85,&H00FFFFFF,&H0000D7FF,&H00000000,&HBB000000,-1,0,0,0,100,100,0,0,1,4,2,2,60,60,500,1\n\n"
              header += "[Events]\n"
              header += "Format: Layer, Start, End, Style, Name, MarginL, MarginR, MarginV, Effect, Text\n"

              def fmt(s):
                  h = int(s // 3600)
                  m = int((s % 3600) // 60)
                  sec = int(s % 60)
                  cs = min(int(round((s % 1) * 100)), 99)
                  return f"{h}:{m:02d}:{sec:02d}.{cs:02d}"

              lines = []
              for i in range(0, len(words), 3):
                  chunk = words[i:i + 3]
                  if not chunk:
                      continue
                  for j, cw in enumerate(chunk):
                      parts = []
                      for k, w in enumerate(chunk):
                          c = w["word"].strip().upper().replace("{", "").replace("}", "")
                          if k == j:
                              parts.append("{\\c&H0000D7FF\\fscx115\\fscy115}" + c + "{\\c&H00FFFFFF\\fscx100\\fscy100}")
                          else:
                              parts.append(c)
                      lines.append(f"Dialogue: 0,{fmt(cw['start'])},{fmt(cw['end'])},Default,,0,0,0,,{' '.join(parts)}")

              with open("subtitles.ass", "w") as f:
                  f.write(header)
                  for l in lines:
                      f.write(l + "\n")
              print(f"OK {len(lines)} lineas")
              return True

          try:
              if not gen():
                  raise Exception("no data")
          except Exception as e:
              print(f"Fallback: {e}")
              fb = "[Script Info]\nScriptType: v4.00+\nPlayResX: 1080\nPlayResY: 1920\n\n"
              fb += "[V4+ Styles]\n"
              fb += "Format: Name, Fontname, Fontsize, PrimaryColour, SecondaryColour, OutlineColour, BackColour, Bold, Italic, Underline, StrikeOut, ScaleX, ScaleY, Spacing, Angle, BorderStyle, Outline, Shadow, Alignment, MarginL, MarginR, MarginV, Encoding\n"
              fb += "Style: Default,Montserrat,80,&H00FFFFFF,&H0000D7FF,&H00000000,&HBB000000,-1,0,0,0,100,100,0,0,1,4,2,2,60,60,500,1\n\n"
              fb += "[Events]\n"
              fb += "Format: Layer, Start, End, Style, Name, MarginL, MarginR, MarginV, Effect, Text\n"
              fb += "Dialogue: 0,0:00:00.00,0:00:05.00,Default,,0,0,0,,\n"
              with open("subtitles.ass", "w") as f:
                  f.write(fb)
          PYEOF

          python3 gen_subs.py || true
          exit 0

      - name: Render final video
        run: |
          set +e
          DUR=$(cat /tmp/dur.txt)
          SAFE_DUR=$(printf '%.2f' "$DUR")

          echo "=== RENDER FINAL ==="
          echo "Duracion: ${SAFE_DUR}s"
          echo "Imagen: ${{ env.HAS_OVERLAY }}"
          echo "Fondo: ${{ env.HAS_BG_READY }}"

          DONE="false"

          # INTENTO 1: Fondo Pexels + Imagen IA encima + Subs + Barra
          if [ "$DONE" = "false" ] && [ "${{ env.HAS_OVERLAY }}" = "true" ] && [ -s "bg.mp4" ] && [ -s "ia_overlay.png" ]; then
            echo "Intento 1: Completo"
            ffmpeg -y \
              -i bg.mp4 \
              -i ia_overlay.png \
              -i audio.wav \
              -filter_complex "\
                [0:v]setsar=1[bg]; \
                [1:v]setsar=1[img]; \
                [bg][img]overlay=(W-w)/2:280[with_img]; \
                [with_img]ass=subtitles.ass[with_subs]; \
                [with_subs]drawbox=x=0:y=0:w='min(iw\,iw*t/${SAFE_DUR})':h=10:color=0xFFD700@0.9:t=fill[final]" \
              -map "[final]" \
              -map 2:a \
              -c:v libx264 -preset medium -crf 20 -pix_fmt yuv420p \
              -c:a aac -b:a 192k -ar 44100 \
              -movflags +faststart \
              -t "$DUR" \
              output.mp4 2>/tmp/r1.log

            [ $? -eq 0 ] && [ -s "output.mp4" ] && DONE="true" && echo "OK Completo" || { echo "Fallo 1"; tail -5 /tmp/r1.log; }
          fi

          # INTENTO 2: Fondo Pexels + Imagen IA (sin subs)
          if [ "$DONE" = "false" ] && [ "${{ env.HAS_OVERLAY }}" = "true" ] && [ -s "bg.mp4" ] && [ -s "ia_overlay.png" ]; then
            echo "Intento 2: Sin subs"
            ffmpeg -y \
              -i bg.mp4 \
              -i ia_overlay.png \
              -i audio.wav \
              -filter_complex "\
                [0:v]setsar=1[bg]; \
                [1:v]setsar=1[img]; \
                [bg][img]overlay=(W-w)/2:280[final]" \
              -map "[final]" \
              -map 2:a \
              -c:v libx264 -preset medium -crf 20 -pix_fmt yuv420p \
              -c:a aac -b:a 192k \
              -movflags +faststart \
              -t "$DUR" \
              output.mp4 2>/dev/null

            [ $? -eq 0 ] && [ -s "output.mp4" ] && DONE="true" && echo "OK Sin subs"
          fi

          # INTENTO 3: Solo fondo + audio + subs
          if [ "$DONE" = "false" ] && [ -s "bg.mp4" ]; then
            echo "Intento 3: Solo fondo"
            ffmpeg -y \
              -i bg.mp4 \
              -i audio.wav \
              -filter_complex "\
                [0:v]ass=subtitles.ass[with_subs]; \
                [with_subs]drawbox=x=0:y=0:w='min(iw\,iw*t/${SAFE_DUR})':h=10:color=0xFFD700@0.9:t=fill[final]" \
              -map "[final]" \
              -map 1:a \
              -c:v libx264 -preset fast -crf 23 -pix_fmt yuv420p \
              -c:a aac -b:a 192k \
              -t "$DUR" \
              output.mp4 2>/dev/null

            [ $? -eq 0 ] && [ -s "output.mp4" ] && DONE="true" && echo "OK Solo fondo"
          fi

          # INTENTO 4: Solo fondo + audio
          if [ "$DONE" = "false" ] && [ -s "bg.mp4" ]; then
            echo "Intento 4: Fondo basico"
            ffmpeg -y \
              -i bg.mp4 \
              -i audio.wav \
              -c:v copy -c:a aac -b:a 192k \
              -movflags +faststart \
              -t "$DUR" \
              output.mp4 2>/dev/null

            [ $? -eq 0 ] && [ -s "output.mp4" ] && DONE="true" && echo "OK Basico"
          fi

          # INTENTO 5: Emergencia
          if [ "$DONE" = "false" ]; then
            echo "Intento 5: Emergencia"
            ffmpeg -y \
              -f lavfi -i "color=c=0x0a0e27:s=1080x1920:d=${DUR}:r=30" \
              -i audio.wav \
              -c:v libx264 -preset ultrafast -crf 28 -pix_fmt yuv420p \
              -c:a aac -b:a 128k \
              -t "$DUR" -shortest \
              output.mp4 2>/dev/null || true
          fi

          echo ""
          [ -s "output.mp4" ] && echo "VIDEO LISTO: $(du -h output.mp4 | cut -f1)" || { echo "FALLO TOTAL"; exit 1; }

      - name: Upload
        id: upload
        run: |
          set +e
          for i in 1 2 3; do
            URL=$(curl -f -A "Mozilla/5.0" --connect-timeout 30 --max-time 300 \
              -F "reqtype=fileupload" -F "time=24h" -F "fileToUpload=@output.mp4" \
              "https://litterbox.catbox.moe/resources/internals/api.php" 2>/dev/null || echo "")
            if echo "$URL" | grep -q "^https://"; then
              echo "video_url=$URL" >> $GITHUB_OUTPUT
              echo "OK: $URL"
              exit 0
            fi
            sleep 5
          done
          echo "video_url=UPLOAD_FAILED" >> $GITHUB_OUTPUT
          exit 0

      - name: Artifact backup
        if: steps.upload.outputs.video_url == 'UPLOAD_FAILED'
        uses: actions/upload-artifact@v4
        with:
          name: video
          path: output.mp4
          retention-days: 1

      - name: Webhook
        if: always()
        run: |
          set +e
          WH="${{ secrets.WEBHOOK_URL }}"
          [ -z "$WH" ] && exit 0
          VR="${{ steps.upload.outputs.video_url }}"
          ST="completed"
          [ "$VR" = "UPLOAD_FAILED" ] && ST="failed"
          [ -z "$VR" ] && ST="failed"
          curl -sf -X POST "$WH" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"$ST\",\"video_url\":\"$VR\"}" 2>/dev/null || true
          exit 0
