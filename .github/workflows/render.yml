name: Render Short Video

on:
  repository_dispatch:
    types: [render-video]

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: ~/.cache/whisper
          key: whisper-small-v3

      - name: Install dependencies
        run: |
          pip install openai-whisper edge-tts
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg bc fonts-montserrat
          mkdir -p ~/.fonts
          wget -q -O ~/.fonts/Montserrat-Black.ttf "https://github.com/google/fonts/raw/main/ofl/montserrat/static/Montserrat-Black.ttf" || true
          fc-cache -f
          echo "✅ Dependencias instaladas"

      # ── Descargar Assets (Con Salvavidas) ──
      - name: Download assets
        run: |
          download() {
            local url="$1" output="$2" attempt=1
            
            # Limpiar la URL de basura o textos vacíos
            url=$(echo "$url" | tr -d '"' | tr -d ' ' | sed 's/undefined//g' | sed 's/null//g')
            
            # El Salvavidas: Si la URL está vacía, usamos un archivo de emergencia
            if [ -z "$url" ]; then
              echo "⚠️ URL rota o vacía para $output. Usando salvavidas..."
              if [ "$output" = "background.mp4" ]; then
                url="https://videos.pexels.com/video-files/3129671/3129671-hd_1080_1920_30fps.mp4"
              elif [ "$output" = "overlay.png" ]; then
                url="https://images.pexels.com/photos/3124111/pexels-photo-3124111.jpeg"
              fi
            fi

            while [ $attempt -le 3 ]; do
              echo "📥 Descargando $output..."
              if curl -L -f --connect-timeout 30 --max-time 120 -o "$output" "$url"; then
                local size=$(stat --printf="%s" "$output" 2>/dev/null || echo "0")
                if [ "$size" -gt 1000 ]; then
                  echo "✅ $output listo"
                  return 0
                fi
              fi
              sleep 5
              attempt=$((attempt + 1))
            done
            return 0
          }
          download "${{ github.event.client_payload.audio_url }}" "audio.wav"
          download "${{ github.event.client_payload.video_url }}" "background.mp4"
          download "${{ github.event.client_payload.image_url }}" "overlay.png"

      # ── Whisper ──
      - name: Transcribe
        run: |
          whisper audio.wav --model small --language ${{ github.event.client_payload.language || 'es' }} --output_format json --word_timestamps True --output_dir . || true

      # ── Subtítulos ──
      - name: Generate subtitles
        run: python generate_subs.py || true

      # ── Render FFmpeg ──
      - name: Render video
        run: |
          chmod +x render.sh
          bash render.sh

      # ── Upload y Webhook de vuelta ──
      - name: Upload result
        id: upload
        run: |
          URL=$(curl -f -F "reqtype=fileupload" -F "time=24h" -F "fileToUpload=@output.mp4" https://litterbox.catbox.moe/resources/internals/api.php 2>/dev/null || echo "")
          if echo "$URL" | grep -q "^https://"; then
            echo "video_url=$URL" >> $GITHUB_OUTPUT
            echo "✅ $URL"
          else
            URL=$(curl -f -F "reqtype=fileupload" -F "fileToUpload=@output.mp4" https://catbox.moe/user/api.php 2>/dev/null || echo "")
            echo "video_url=$URL" >> $GITHUB_OUTPUT
          fi

      - name: Notify Activepieces
        if: always()
        run: |
          if [ -n "${{ steps.upload.outputs.video_url }}" ]; then
            PAYLOAD="{\"status\":\"completed\",\"video_url\":\"${{ steps.upload.outputs.video_url }}\"}"
          else
            PAYLOAD="{\"status\":\"failed\"}"
          fi
          curl -sf -X POST "${{ secrets.WEBHOOK_URL }}" -H "Content-Type: application/json" -d "$PAYLOAD" || true
