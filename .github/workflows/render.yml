# ==============================================================================
# 🚀 PIPELINE NUCLEAR v4.4.3 - DOBLE FILO - SISTEMA DE VIDEO AUTOMÁTICO
# ==============================================================================
# VERSIÓN: 4.4.3 - ESTERILIZACIÓN DE AUDIO + FB + DAILYMOTION + MAKE
# ==============================================================================

name: "Doble Filo - Pipeline Nuclear v3.0"

concurrency:
  group: render-video-unico
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHONIOENCODING: "utf-8"
  PYTHONLEGACYWINDOWSSTDIO: "utf-8"
  LANG: "C.UTF-8"
  LC_ALL: "C.UTF-8"
  WORK_DIR: "/home/runner/work_pipeline"

on:
  repository_dispatch:
    types: [render-video]

permissions:
  contents: write
  actions: write
  id-token: write

jobs:
  render-and-publish:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    outputs:
      youtube_status: ${{ steps.youtube.outputs.youtube_status }}
      tiktok_status: ${{ steps.tiktok.outputs.tiktok_status }}
      instagram_status: ${{ steps.instagram.outputs.instagram_status }}
      video_duration: ${{ steps.audio_gen.outputs.video_duration }}
      titulo_corto: ${{ steps.extraer.outputs.titulo_corto }}

    steps:

      - name: "🔍 Diagnóstico inicial del runner"
        run: |
          echo "=============================================="
          echo "🖥️  INFORMACIÓN DEL RUNNER"
          echo "=============================================="
          echo "📅 Fecha y hora UTC: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "🐧 Sistema operativo: $(lsb_release -d 2>/dev/null | cut -f2 || cat /etc/os-release | grep PRETTY_NAME | cut -d= -f2)"
          echo "🧠 CPU cores disponibles: $(nproc)"
          echo "🐍 Python version: $(python3 --version 2>&1)"
          echo "=============================================="

      - name: "📂 Checkout del repositorio"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "🛠️ Instalar dependencias del sistema"
        timeout-minutes: 15
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          echo "=============================================="
          echo "📦 INSTALANDO DEPENDENCIAS DEL SISTEMA"
          echo "=============================================="

          sudo apt-get update -qq 2>&1 | tail -5 || true

          sudo apt-get install -yq --no-install-recommends \
            ffmpeg bc file wget curl fonts-liberation libnss3 libatk-bridge2.0-0 libgbm1 fontconfig \
            2>&1 | grep -E "(error|Error|ERROR)" || true

          echo ""
          echo "🔤 Instalando fuente Montserrat Black..."
          mkdir -p ~/.fonts

          FONT_DOWNLOADED=false
          wget -q --timeout=30 -O ~/.fonts/Montserrat-Black.ttf "https://github.com/google/fonts/raw/main/ofl/montserrat/static/Montserrat-Black.ttf" 2>/dev/null && FONT_DOWNLOADED=true || true

          if [ "$FONT_DOWNLOADED" = "false" ]; then
            cp /usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf ~/.fonts/Montserrat-Black.ttf 2>/dev/null || true
            echo "FONT_NAME=Liberation Sans" >> $GITHUB_ENV
          else
            echo "FONT_NAME=Montserrat Black" >> $GITHUB_ENV
          fi

          fc-cache -f -v 2>/dev/null | grep -i "montserrat\|liberation" || true
          echo "✅ Fuente configurada: $(cat $GITHUB_ENV | grep FONT_NAME)"

          echo ""
          echo "🐍 Instalando dependencias de Python (Forzado GPU Lite)..."

          python3 -m pip install --upgrade pip --break-system-packages || python3 -m pip install --upgrade pip
          
          python3 -m pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu --break-system-packages || python3 -m pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          
          python3 -m pip install openai-whisper edge-tts requests gtts google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client numpy tqdm --break-system-packages || python3 -m pip install openai-whisper edge-tts requests gtts google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client numpy tqdm

          echo "✅ Dependencias Python instaladas correctamente en versión ligera"

      - name: "📝 Extraer y sanear textos UTF-8 (Limpieza Profunda)"
        id: extraer
        timeout-minutes: 2
        env:
          TITULO_RAW: ${{ github.event.client_payload.titulo }}
          DESCRIPCION_RAW: ${{ github.event.client_payload.descripcion }}
          SCRIPT_RAW: ${{ github.event.client_payload.script_text }}
        run: |
          cat << 'PYTHON_EXTRAER' > /tmp/extraer_textos.py
          import os, sys, unicodedata, re

          sys.stdout.reconfigure(encoding='utf-8')
          sys.stderr.reconfigure(encoding='utf-8')

          def repair_encoding(text):
              if not text: return ''
              if isinstance(text, bytes):
                  try: return text.decode('utf-8')
                  except: return text.decode('latin-1', errors='replace')
              try: return text.encode('latin-1').decode('utf-8')
              except: pass
              return text

          def clean_invisible_chars(text):
              if not text: return ''
              text = text.lstrip('\ufeff')
              text = text.replace('\u00a0', ' ')
              for char in ['\u200b', '\u200c', '\u200d', '\u200e', '\u200f', '\u2060', '\u00ad', '\u00ac', '\u2028', '\u2029']: 
                  text = text.replace(char, '')
              text = text.replace('\u2019', "'").replace('\u2018', "'").replace('\u201c', '"').replace('\u201d', '"')
              text = re.sub(r'[\x00-\x08\x0b\x0c\x0e-\x1f\x7f]', '', text)
              text = re.sub(r' {2,}', ' ', text)
              return re.sub(r'\n{3,}', '\n\n', text).strip()

          def sanitize_for_audio(text):
              if not text: return ''
              # Se eliminan símbolos visuales que traban al bot de voz
              t = re.sub(r'[\*\"\'\«\»\(\)\[\]\{\}\#\_\|\~]', '', text)
              # Solo dejamos letras, números y puntuación necesaria para las pausas
              t = re.sub(r'[^\w\s\.,;:\?!¡¿áéíóúÁÉÍÓÚñÑüÜ\-]', '', t)
              return re.sub(r' {2,}', ' ', t).strip()

          def clean_title(text):
              if not text: return ''
              # Limpieza agresiva de comillas y asteriscos para títulos limpios
              t = re.sub(r'[\*\"\'\«\»\_\|\~]', '', text)
              return re.sub(r' {2,}', ' ', t).strip()

          def validate_and_limit(text, max_length, default_value):
              if not text or len(text.strip()) < 3: return default_value
              return text.strip()[:max_length]

          def aplicar_diccionario(text):
              if not text: return text
              diccionario = {
                  "Claude Mitos": "Claude 3 Opus",
                  "chat GPT": "ChatGPT",
                  "Open A I": "OpenAI",
                  "Yutub": "YouTube"
              }
              for err, corr in diccionario.items():
                  text = text.replace(err, corr)
              return text

          # 1. Procesar y limpiar Título
          titulo_base = clean_invisible_chars(repair_encoding(os.environ.get('TITULO_RAW', '')))
          titulo_limpio = clean_title(aplicar_diccionario(titulo_base))
          titulo = validate_and_limit(titulo_limpio, 100, "🚀 Noticia Tech del Momento")

          # 2. Procesar Descripción
          desc_limpia = clean_invisible_chars(repair_encoding(os.environ.get('DESCRIPCION_RAW', '')))
          descripcion = validate_and_limit(aplicar_diccionario(desc_limpia), 5000, "#tech #noticias #shorts")

          # 3. Procesar Guion Visual (Para los subtítulos, mantiene asteriscos)
          script_base = clean_invisible_chars(repair_encoding(os.environ.get('SCRIPT_RAW', '')))
          script_text = validate_and_limit(aplicar_diccionario(script_base), 5000, "Esto cambia todo lo que conocías. Sigue viendo.")
          
          # 4. Procesar Guion de Audio (Esterilizado para que la voz no se trabe)
          script_audio = sanitize_for_audio(script_text)

          # Guardar archivos
          with open('titulo.txt', 'w', encoding='utf-8') as f: f.write(titulo)
          with open('descripcion.txt', 'w', encoding='utf-8') as f: f.write(descripcion)
          with open('script.txt', 'w', encoding='utf-8') as f: f.write(script_text)
          with open('script_audio.txt', 'w', encoding='utf-8') as f: f.write(script_audio)
          with open('titulo_corto.txt', 'w', encoding='utf-8') as f: f.write(titulo[:50])
          
          print("✅ EXTRACCIÓN Y ESTERILIZACIÓN DE TEXTOS COMPLETADA")
          PYTHON_EXTRAER

          python3 /tmp/extraer_textos.py
          TITULO_CORTO=$(python3 -c "print(open('titulo_corto.txt', encoding='utf-8').read().strip())" 2>/dev/null || echo "Video sin título")
          echo "titulo_corto=${TITULO_CORTO}" >> $GITHUB_OUTPUT

      - name: "🎙️ Descargar MULTI-CLIP y generar audio (Voz Fluida)"
        id: audio_gen
        timeout-minutes: 12
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          BUSQUEDA: ${{ github.event.client_payload.busqueda_pexels }}
          VIDEO_URL_FALLBACK: ${{ github.event.client_payload.video_url }}
        run: |
          cat << 'PYTHON_MULTI_CLIP' > /tmp/bajar_clips.py
          import os, requests, sys

          api_key = os.environ.get('PEXELS_API_KEY', '').strip()
          query = os.environ.get('BUSQUEDA', '').strip()
          fallback_url = os.environ.get('VIDEO_URL_FALLBACK', '').strip()

          if not query or len(query) < 2:
              try:
                  query = open('titulo_corto.txt', encoding='utf-8').read().strip().split()[0]
              except:
                  query = 'technology fast'

          downloaded_files = []

          if api_key:
              print(f"🔍 Buscando videos en Pexels para: {query}")
              url = f"https://api.pexels.com/videos/search?query={query}&orientation=portrait&size=medium&per_page=15"
              try:
                  res = requests.get(url, headers={'Authorization': api_key}, timeout=15).json()
                  videos = res.get('videos', [])
                  
                  links = []
                  for v in videos:
                      files = sorted(v['video_files'], key=lambda x: x['width'] * x['height'], reverse=True)
                      for f in files:
                          if f['width'] <= f['height'] and f['link']: 
                              links.append(f['link'])
                              break
                  
                  for i, link in enumerate(links[:4]):
                      print(f"📥 Descargando clip {i+1}...")
                      r = requests.get(link, timeout=30)
                      if r.status_code == 200:
                          filename = f"clip_{i}.mp4"
                          with open(filename, 'wb') as f:
                              f.write(r.content)
                          downloaded_files.append(filename)
              except Exception as e:
                  print(f"❌ Error buscando en Pexels: {e}")

          if not downloaded_files and fallback_url and fallback_url != 'null':
              print("⚠️ Usando video de fallback de Activepieces...")
              try:
                  r = requests.get(fallback_url, timeout=30)
                  if r.status_code == 200:
                      with open("clip_0.mp4", 'wb') as f:
                          f.write(r.content)
                      downloaded_files.append("clip_0.mp4")
              except:
                  pass

          if not downloaded_files:
              print("❌ No se pudo descargar ningún video. Creando fondo negro de emergencia.")
              os.system('ffmpeg -y -f lavfi -i "color=c=black:s=1080x1920:d=10:r=30" -c:v libx264 -preset ultrafast pexels.mp4 2>/dev/null')
          else:
              print("🎬 Normalizando clips para concatenación (1080x1920, 30fps)...")
              with open("concat_list.txt", "w") as f:
                  for i, clip in enumerate(downloaded_files):
                      out_name = f"norm_{i}.mp4"
                      cmd = f'ffmpeg -y -i {clip} -vf "scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,setsar=1,fps=30" -c:v libx264 -preset fast -crf 23 -pix_fmt yuv420p -an {out_name} 2>/dev/null'
                      os.system(cmd)
                      f.write(f"file '{out_name}'\n")

              print("🔗 Uniendo los clips...")
              os.system('ffmpeg -y -f concat -safe 0 -i concat_list.txt -c copy pexels.mp4 2>/dev/null')
          PYTHON_MULTI_CLIP

          python3 /tmp/bajar_clips.py

          # Usamos script_audio.txt esterilizado para generar la voz
          AUDIO_OK=false
          edge-tts --voice "es-ES-AlvaroNeural" --rate="+5%" --pitch="-3Hz" --file script_audio.txt --write-media audio_attempt1.mp3 2>/dev/null || true
          if [ "$(stat -c%s audio_attempt1.mp3 2>/dev/null || echo 0)" -gt 5000 ]; then
            cp audio_attempt1.mp3 audio.mp3; AUDIO_OK=true
          else
            edge-tts --voice "es-ES-JorgeNeural" --rate="+5%" --file script_audio.txt --write-media audio_attempt2.mp3 2>/dev/null || true
            if [ "$(stat -c%s audio_attempt2.mp3 2>/dev/null || echo 0)" -gt 5000 ]; then
              cp audio_attempt2.mp3 audio.mp3; AUDIO_OK=true
            else
              python3 -c "from gtts import gTTS; gTTS(text=open('script_audio.txt', encoding='utf-8').read().strip(), lang='es').save('audio_attempt3.mp3')" 2>/dev/null || true
              if [ "$(stat -c%s audio_attempt3.mp3 2>/dev/null || echo 0)" -gt 5000 ]; then cp audio_attempt3.mp3 audio.mp3; AUDIO_OK=true; fi
            fi
          fi

          if [ "$AUDIO_OK" = "false" ]; then ffmpeg -y -f lavfi -i "sine=frequency=440:duration=30" -c:a libmp3lame -b:a 128k audio.mp3 2>/dev/null || true; fi
          
          ffmpeg -y -i audio.mp3 -acodec pcm_s16le -ar 44100 -ac 1 audio_voz.wav 2>/dev/null
          
          if [ -f "musica_tension.mp3" ]; then
            echo "🎵 Mezclando voz con música de tensión..."
            ffmpeg -y -i audio_voz.wav -stream_loop -1 -i musica_tension.mp3 -filter_complex "[1:a]volume=0.08[bg];[0:a][bg]amix=inputs=2:duration=first:dropout_transition=2[a]" -map "[a]" -acodec pcm_s16le -ar 44100 -ac 1 audio.wav 2>/dev/null
          else
            echo "⚠️ No se encontró 'musica_tension.mp3' en el repositorio. Usando solo la voz."
            mv audio_voz.wav audio.wav
          fi

          if [ ! -s "audio.wav" ]; then exit 1; fi

          DURACION=$(ffprobe -v quiet -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 audio.wav 2>/dev/null || echo "30")
          DURACION_INT=$(python3 -c "print(f'{max(10, min(180, float(\"$DURACION\"))):.2f}')")
          echo "$DURACION_INT" > dur.txt
          echo "video_duration=${DURACION_INT}" >> $GITHUB_OUTPUT
          rm -f audio_attempt1.mp3 audio_attempt2.mp3 audio_attempt3.mp3 audio_voz.wav

      - name: "💬 Generar subtítulos ANIMADOS (Estilo Doble Filo)"
        timeout-minutes: 15
        run: |
          python3 -c "
          import whisper, json, sys
          sys.stdout.reconfigure(encoding='utf-8')
          model = whisper.load_model('medium')
          result = model.transcribe('audio.wav', language='es', word_timestamps=True, condition_on_previous_text=True, initial_prompt='Vídeo de noticias de tecnología en español de España.', temperature=0.0, beam_size=5)
          with open('audio.json', 'w', encoding='utf-8') as f: json.dump(result, f, ensure_ascii=False)
          " 2>/dev/null || true

          if [ ! -s "audio.json" ]; then
            python3 -c "import json; t=open('script.txt',encoding='utf-8').read().strip().split(); d=float(open('dur.txt').read().strip()); tpw=d/max(len(t),1); json.dump({'segments': [{'start':i*tpw,'end':(i+1)*tpw,'words':[{'word':w,'start':i*tpw,'end':(i+1)*tpw}]} for i,w in enumerate(t)]}, open('audio.json','w',encoding='utf-8'))"
          fi

          cat << 'PYTHON_SUBTITULOS' > /tmp/gen_subtitulos.py
          import json, os, sys, re
          sys.stdout.reconfigure(encoding='utf-8')

          try:
              # Usamos el script_txt original (con asteriscos) para detectar las palabras clave en rojo
              original_script = open('script.txt', encoding='utf-8').read()
              red_words = [re.sub(r'[^\w\s]', '', w.strip('*').upper()) for w in original_script.split() if w.startswith('*') and w.endswith('*')]
          except:
              red_words = []

          SPANGLISH_FIXES = {'HACK': 'TRUCO', 'HAC': 'TRUCO', 'PLOTTWIST': 'GIRO INESPERADO', 'PLOT TWIST': 'GIRO INESPERADO', 'PLOTTUIST': 'GIRO INESPERADO', 'FAKENIUS': 'FALSO', 'FAKE': 'FALSO'}
          
          def fix_spanglish(text):
              t = text.upper().strip()
              for eng, esp in SPANGLISH_FIXES.items(): t = re.sub(r'\b' + re.escape(eng) + r'\b', esp, t)
              return t

          def format_time_ass(seconds):
              s = max(0.0, seconds)
              return f"{int(s//3600)}:{int((s%3600)//60):02d}:{int(s%60):02d}.{min(int(round((s%1)*100)), 99):02d}"

          def clean_for_ass(text):
              return re.sub(r' {2,}', ' ', text.replace('{', '').replace('}', '').replace('\\', '').replace('\n', ' ').replace('\r', '')).strip()

          try:
              with open('audio.json', 'r', encoding='utf-8') as f: data = json.load(f)
          except: sys.exit(1)

          all_words = [{'word': clean_for_ass(w.get('word','')), 'start': w.get('start',0.0), 'end': w.get('end',0.0)} for s in data.get('segments',[]) for w in s.get('words',[]) if w.get('word','').strip() and w.get('end',0)>w.get('start',0)]
          font_name = os.environ.get('FONT_NAME', 'Montserrat Black')

          ASS_HEADER = f"""[Script Info]
          ScriptType: v4.00+
          WrapStyle: 0
          ScaledBorderAndShadow: yes
          PlayResX: 1080
          PlayResY: 1920

          [V4+ Styles]
          Format: Name, Fontname, Fontsize, PrimaryColour, SecondaryColour, OutlineColour, BackColour, Bold, Italic, Underline, StrikeOut, ScaleX, ScaleY, Spacing, Angle, BorderStyle, Outline, Shadow, Alignment, MarginL, MarginR, MarginV, Encoding
          Style: Default,{font_name},110,&H00FFFFFF,&H00FFFFFF,&H00000000,&H99151515,-1,0,0,0,100,100,0,0,3,10,0,5,40,40,250,1

          [Events]
          Format: Layer, Start, End, Style, Name, MarginL, MarginR, MarginV, Effect, Text
          """.replace('          ', '')

          chunks = []
          current_chunk = []
          char_count = 0

          for i, word in enumerate(all_words):
              w_text = fix_spanglish(word['word'])
              clean_w = re.sub(r'[^\w\s]', '', w_text)
              
              if clean_w in red_words and clean_w != "":
                  w_text = f"{{\\c&H001111CC&}}{w_text}{{\\c&H00FFFFFF&}}"

              current_chunk.append({'text': w_text, 'start': word['start'], 'end': word['end']})
              char_count += len(re.sub(r'\{.*?\}', '', w_text))

              if len(current_chunk) >= 2 or char_count > 12 or i == len(all_words) - 1:
                  chunks.append({
                      'text': ' '.join(w['text'] for w in current_chunk),
                      'start': current_chunk[0]['start'],
                      'end': current_chunk[-1]['end']
                  })
                  current_chunk = []
                  char_count = 0

          dialogue_lines = []
          for i, chunk in enumerate(chunks):
              line_start = chunk['start']
              line_end = chunks[i+1]['start'] if i < len(chunks) - 1 else chunk['end'] + 0.1
              
              anim_tag = r'{\fscx85\fscy85\t(0,120,\fscx100\fscy100)}'
              line_text = f"{anim_tag}{chunk['text']}"

              if line_start < line_end:
                  dialogue_lines.append(f"Dialogue: 0,{format_time_ass(line_start)},{format_time_ass(line_end)},Default,,0,0,0,,{line_text}")

          with open('subtitles.ass', 'w', encoding='utf-8') as f: 
              f.write(ASS_HEADER + '\n' + '\n'.join(dialogue_lines))
          PYTHON_SUBTITULOS

          python3 /tmp/gen_subtitulos.py

      - name: "🎬 Renderizar video final (Con Logo y Barra Doble Filo)"
        timeout-minutes: 20
        run: |
          DUR=$(cat dur.txt)
          ASS_PATH=$(realpath subtitles.ass)
          ASS_PATH_ESCAPED=$(echo "$ASS_PATH" | sed 's/:/\\:/g')
          
          if [ ! -f "logo.png" ]; then wget -q -O logo.png "https://upload.wikimedia.org/wikipedia/commons/c/ca/1x1.png" || true; fi

          ffmpeg -y \
            -stream_loop -1 -i pexels.mp4 -i audio.wav -i logo.png \
            -filter_complex "[0:v]scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,setsar=1,zoompan=z='min(max(zoom\,pzoom)+0.0005\,1.3)':d=1:x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':s=1080x1920,eq=brightness=-0.05:saturation=1.1:contrast=1.05[bg];[2:v]scale=160:-1,colorchannelmixer=aa=0.85[logo_scaled];[bg][logo_scaled]overlay=W-w-50:50[bg_logo];[bg_logo]subtitles='${ASS_PATH_ESCAPED}':fontsdir=~/.fonts[vwithsubs];[vwithsubs]drawbox=x=0:y=0:w='min(iw\,iw*t/${DUR})':h=10:color=0xCC0000@0.9:t=fill[outv]" \
            -map "[outv]" -map 1:a -c:v libx264 -preset fast -crf 22 -pix_fmt yuv420p -r 30 -c:a aac -b:a 192k -t "$DUR" -movflags +faststart output.mp4 \
            2>&1 | tee ffmpeg_output.log | tail -20

          if [ ! -f "output.mp4" ] || [ "$(stat -c%s output.mp4)" -lt 100000 ]; then 
            echo "❌ Error Crítico: FFmpeg generó un archivo corrupto o muy pequeño."
            exit 1
          fi

      - name: "📺 Publicar en YouTube"
        id: youtube
        continue-on-error: true
        timeout-minutes: 10
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          cat << 'PYTHON_YOUTUBE' > /tmp/subir_youtube.py
          import os
          import sys
          import traceback
          from google.auth.transport.requests import Request
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          from googleapiclient.errors import HttpError

          sys.stdout.reconfigure(encoding='utf-8')

          try:
              client_id = os.environ.get('YOUTUBE_CLIENT_ID', '')
              client_secret = os.environ.get('YOUTUBE_CLIENT_SECRET', '')
              refresh_token = os.environ.get('YOUTUBE_REFRESH_TOKEN', '')
              
              if not all([client_id, client_secret, refresh_token]):
                  print("❌ Error: Faltan credenciales de YouTube en los Secrets de GitHub.")
                  sys.exit(1)

              token_data = {
                  'token': None,
                  'refresh_token': refresh_token,
                  'token_uri': 'https://oauth2.googleapis.com/token',
                  'client_id': client_id,
                  'client_secret': client_secret,
                  'scopes': ['https://www.googleapis.com/auth/youtube.upload']
              }
              
              print("Autenticando con YouTube...")
              creds = Credentials.from_authorized_user_info(token_data)
              creds.refresh(Request())
              youtube = build('youtube', 'v3', credentials=creds)

              titulo = open('titulo.txt', 'r', encoding='utf-8').read().strip()[:100]
              descripcion = open('descripcion.txt', 'r', encoding='utf-8').read().strip()[:5000]

              request_body = {
                  'snippet': {
                      'categoryId': '28',
                      'title': titulo,
                      'description': descripcion,
                      'tags': ['tech', 'noticias', 'shorts', 'tecnologia', 'viral'],
                      'defaultLanguage': 'es',
                      'defaultAudioLanguage': 'es'
                  },
                  'status': {
                      'privacyStatus': 'public',
                      'selfDeclaredMadeForKids': False,
                      'madeForKids': False
                  }
              }
              
              media_file = MediaFileUpload('output.mp4', mimetype='video/mp4', resumable=True, chunksize=50 * 1024 * 1024)

              print(f"⬆️ Subiendo a YouTube: {titulo[:50]}")
              upload_request = youtube.videos().insert(part='snippet,status', body=request_body, media_body=media_file)
              
              response = None
              while response is None:
                  status, response = upload_request.next_chunk()
                  if status: 
                      print(f"   📤 Progreso: {int(status.progress() * 100)}%")
                      
              print(f"\n✅ VIDEO SUBIDO EXITOSAMENTE: https://www.youtube.com/shorts/{response.get('id')}")

          except HttpError as e: 
              print(f"\n❌ ERROR API YOUTUBE: {e.resp.status}")
              print(f"Detalle: {e.content.decode('utf-8')}")
              sys.exit(1)
          except Exception as e: 
              print("\n❌ ERROR GENERAL YOUTUBE:")
              traceback.print_exc()
              sys.exit(1)
          PYTHON_YOUTUBE
          if python3 /tmp/subir_youtube.py; then echo "youtube_status=✅ YouTube OK" >> $GITHUB_OUTPUT; else echo "youtube_status=❌ YouTube Falló" >> $GITHUB_OUTPUT; fi

      - name: "🎵 Publicar en TikTok (Vía Make)"
        id: tiktok
        continue-on-error: true
        timeout-minutes: 5
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
        run: |
          echo "☁️ Subiendo video a S3 VIP para que Make pueda descargarlo..."
          gh release view ig-cdn >/dev/null 2>&1 || gh release create ig-cdn --title "IG CDN" --notes "Almacenamiento temporal VIP"
          gh release upload ig-cdn output.mp4 --clobber
          
          VIDEO_PUBLIC_URL="https://github.com/${REPO_NAME}/releases/download/ig-cdn/output.mp4"
          echo "✅ URL pública del video generada: $VIDEO_PUBLIC_URL"
          
          cat << 'PYTHON_TIKTOK_MAKE' > /tmp/subir_tiktok_make.py
          import os, sys, requests
          sys.stdout.reconfigure(encoding='utf-8')

          webhook_url = "https://hook.eu1.make.com/khybibeyd846rrhtpsdsoo4ty7lyyl8e"
          
          if not webhook_url or webhook_url == "TU_URL_DE_MAKE_AQUI":
              print("❌ Error: Tienes que pegar tu URL de Make en el código (variable webhook_url).")
              sys.exit(1)

          video_url = os.environ.get('VIDEO_PUBLIC_URL', '')
          
          try:
              titulo = open('titulo.txt', 'r', encoding='utf-8').read().strip()
              descripcion = open('descripcion.txt', 'r', encoding='utf-8').read().strip()
          except:
              titulo = "Nuevo Video"
              descripcion = ""

          titulo_final = f"{titulo}\n\n{descripcion}".strip()

          payload = {
              "titulo": titulo_final,
              "video_url": video_url
          }

          print(f"🚀 Enviando datos a Make: {titulo_final[:30]}...")
          try:
              response = requests.post(webhook_url, json=payload, timeout=30)
              if response.status_code in [200, 201, 202]:
                  print("✅ Datos enviados a Make correctamente.")
                  sys.exit(0)
              else:
                  print(f"❌ Error de Make: HTTP {response.status_code}")
                  print(response.text)
                  sys.exit(1)
          except Exception as e:
              print(f"❌ Error conectando con Make: {e}")
              sys.exit(1)
          PYTHON_TIKTOK_MAKE
          
          export VIDEO_PUBLIC_URL=$VIDEO_PUBLIC_URL
          if python3 /tmp/subir_tiktok_make.py; then 
            echo "tiktok_status=✅ TikTok (Make) OK" >> $GITHUB_OUTPUT
          else 
            echo "tiktok_status=❌ TikTok (Make) Falló" >> $GITHUB_OUTPUT
          fi

      - name: "📷 Publicar en Instagram (S3 CDN VIP)"
        id: instagram
        continue-on-error: true
        timeout-minutes: 12
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
        run: |
          echo "☁️ Usando release temporal en GitHub..."
          gh release view ig-cdn >/dev/null 2>&1 || gh release create ig-cdn --title "IG CDN" --notes "Almacenamiento temporal VIP para Meta"
          gh release upload ig-cdn output.mp4 --clobber
          
          VIDEO_PUBLIC_URL="https://github.com/${REPO_NAME}/releases/download/ig-cdn/output.mp4"
          
          cat << 'PYTHON_INSTAGRAM' > /tmp/subir_instagram.py
          import os, sys, time, requests, traceback
          sys.stdout.reconfigure(encoding='utf-8')

          try:
              access_token = os.environ.get('INSTAGRAM_ACCESS_TOKEN', '')
              user_id = os.environ.get('INSTAGRAM_USER_ID', '')
              video_public_url = os.environ.get('VIDEO_PUBLIC_URL', '')
              
              if not access_token or not user_id: 
                  print("❌ Error: Faltan secretos de Instagram.")
                  sys.exit(1)

              caption = open('titulo.txt', 'r', encoding='utf-8').read().strip()[:2200]
              
              print("📦 Creando media container en Meta desde la URL VIP de S3...")
              container_response = requests.post(f"https://graph.instagram.com/v21.0/{user_id}/media", data={'media_type': 'REELS', 'video_url': video_public_url, 'caption': caption, 'share_to_feed': True, 'access_token': access_token}, timeout=60).json()
              
              if 'error' in container_response: 
                  print(f"❌ Error de Meta API al crear contenedor: {container_response['error']}")
                  sys.exit(1)
                  
              container_id = container_response.get('id')
              
              print("⏳ Esperando procesamiento de Meta...")
              for _ in range(24):
                  time.sleep(15)
                  status_response = requests.get(f"https://graph.instagram.com/v21.0/{container_id}", params={'fields': 'status_code,status_info', 'access_token': access_token}).json()
                  status = status_response.get('status_code', 'UNKNOWN')
                  print(f"   🔄 Estado actual en Meta: {status}")
                  
                  if status == 'FINISHED': 
                      break
                  elif status == 'ERROR': 
                      error_detail = status_response.get('status_info', 'Razón desconocida')
                      print(f"❌ Meta rechazó el video. Detalle exacto: {error_detail}")
                      sys.exit(1)
              
              publish = requests.post(f"https://graph.instagram.com/v21.0/{user_id}/media_publish", data={'creation_id': container_id, 'access_token': access_token}).json()
              print(f"✅ REEL PUBLICADO CON ÉXITO: https://www.instagram.com/p/{publish.get('id')}/")

          except Exception as e: 
              print("\n❌ ERROR GENERAL INSTAGRAM:")
              traceback.print_exc()
              sys.exit(1)
          PYTHON_INSTAGRAM
          
          export VIDEO_PUBLIC_URL=$VIDEO_PUBLIC_URL
          if python3 /tmp/subir_instagram.py; then echo "instagram_status=✅ Instagram OK" >> $GITHUB_OUTPUT; else echo "instagram_status=❌ Instagram Falló" >> $GITHUB_OUTPUT; fi

      - name: "📱 Publicar en Facebook Reels"
        continue-on-error: true
        timeout-minutes: 10
        env:
          META_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
        run: |
          cat << 'PYTHON_FB' > /tmp/subir_fb.py
          import os, requests, sys
          sys.stdout.reconfigure(encoding='utf-8')

          token = os.environ.get('META_ACCESS_TOKEN')
          page_id = "61575481445203"

          if not token:
              print("⚠️ Falta el token de Meta. Saltando Facebook...")
              sys.exit(0)

          try:
              titulo = open('titulo.txt', 'r', encoding='utf-8').read().strip()
              descripcion = open('descripcion.txt', 'r', encoding='utf-8').read().strip()
              texto_completo = f"{titulo}\n\n{descripcion}"
              
              print("🔄 Inicializando subida a Facebook Reels...")
              url_init = f"https://graph.facebook.com/v19.0/{page_id}/video_reels"
              init_data = {"upload_phase": "start", "access_token": token}
              res_init = requests.post(url_init, data=init_data).json()
              
              video_id = res_init.get("video_id")
              upload_url = res_init.get("upload_url")
              
              if not upload_url:
                  print(f"❌ Error al inicializar: {res_init}")
                  sys.exit(1)
                  
              print("⬆️ Subiendo archivo MP4 a Meta...")
              headers = {"Authorization": f"OAuth {token}", "offset": "0"}
              with open("output.mp4", "rb") as f: video_data = f.read()
              headers["file_size"] = str(len(video_data))
              
              requests.post(upload_url, headers=headers, data=video_data)
              
              print("📝 Publicando el Reel en tu página...")
              pub_data = {"upload_phase": "finish", "video_id": video_id, "video_state": "PUBLISHED", "description": texto_completo, "access_token": token}
              res_pub = requests.post(url_init, data=pub_data).json()
              
              if res_pub.get("success"): print("✅ Facebook Reels OK.")
              else: print(f"❌ Error al publicar: {res_pub}")
          except Exception as e:
              print(f"❌ Error interno en Facebook: {e}")
              sys.exit(1)
          PYTHON_FB
          
          python3 /tmp/subir_fb.py

      - name: "📺 Publicar en Dailymotion"
        continue-on-error: true
        timeout-minutes: 10
        env:
          DM_USERNAME: ${{ secrets.DM_USERNAME }}
          DM_PASSWORD: ${{ secrets.DM_PASSWORD }}
        run: |
          cat << 'PYTHON_DAILYMOTION' > /tmp/subir_dailymotion.py
          import os, requests, sys
          sys.stdout.reconfigure(encoding='utf-8')

          client_id = "5b12c2acf4eddc9b4238"
          client_secret = "38b07d41f7adb1d902b91f07c0aadcde60cc1a8b"
          username = os.environ.get('DM_USERNAME')
          password = os.environ.get('DM_PASSWORD')

          if not username or not password:
              print("⚠️ Faltan correo/contraseña de Dailymotion en Secrets. Saltando...")
              sys.exit(0)

          try:
              titulo = open('titulo.txt', 'r', encoding='utf-8').read().strip()[:255]
              descripcion = open('descripcion.txt', 'r', encoding='utf-8').read().strip()[:3000]
              
              auth_resp = requests.post('https://api.dailymotion.com/oauth/token', data={'grant_type': 'password', 'client_id': client_id, 'client_secret': client_secret, 'username': username, 'password': password, 'scope': 'manage_videos'}).json()
              token = auth_resp.get('access_token')
              
              if not token: sys.exit(1)
                  
              headers = {'Authorization': f'Bearer {token}'}
              upload_url = requests.get('https://api.dailymotion.com/file/upload', headers=headers).json().get('upload_url')
              
              with open('output.mp4', 'rb') as f: video_url = requests.post(upload_url, files={'file': f}).json().get('url')
              
              publish_resp = requests.post('https://api.dailymotion.com/me/videos', headers=headers, data={'url': video_url, 'title': titulo, 'description': descripcion, 'channel': 'news', 'published': 'true', 'private': 'false'}).json()
              
              if publish_resp.get('id'): print(f"✅ Dailymotion OK: https://www.dailymotion.com/video/{publish_resp.get('id')}")
          except Exception as e:
              print(f"❌ Error en Dailymotion: {e}")
              sys.exit(1)
          PYTHON_DAILYMOTION
          
          python3 /tmp/subir_dailymotion.py

      - name: "📦 Subir artifacts de diagnóstico"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "pipeline-artifacts-${{ github.run_number }}"
          path: |
            output.mp4
            subtitles.ass
            audio.json
            ffmpeg_output.log
            titulo.txt
            descripcion.txt
            script.txt
            script_audio.txt
          retention-days: 7
          if-no-files-found: warn

      - name: "📲 Notificar resultado por Telegram"
        if: always()
        timeout-minutes: 2
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TITULO=$(python3 -c "try: print(open('titulo.txt', encoding='utf-8').read().strip()[:50]) 
          except: print('Sin título')" 2>/dev/null || echo "Sin título")
          DURACION=$(cat dur.txt 2>/dev/null | python3 -c "import sys
          try: 
            d=float(sys.stdin.read().strip()); print(f'{int(d)}s')
          except: print('?')" 2>/dev/null || echo "?")
          YT_STATUS="${{ steps.youtube.outputs.youtube_status || '❌ Error' }}"
          TK_STATUS="${{ steps.tiktok.outputs.tiktok_status || '❌ Error' }}"
          IG_STATUS="${{ steps.instagram.outputs.instagram_status || '❌ Error' }}"

          MENSAJE="🤖 *Doble Filo*
          %0A📹 ${TITULO}
          %0A⏱️ ${DURACION}
          %0A%0A▶️ YT: ${YT_STATUS}
          %0A🎵 TK: ${TK_STATUS}
          %0A📷 IG: ${IG_STATUS}"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" -d "chat_id=${TELEGRAM_CHAT_ID}" -d "text=${MENSAJE}" -d "parse_mode=Markdown" -d "disable_web_page_preview=true" 2>/dev/null
