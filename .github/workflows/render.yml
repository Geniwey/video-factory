name: Render Short Video

on:
  repository_dispatch:
    types: [render-video]

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: ~/.cache/whisper
          key: whisper-small-v3

      - name: Install dependencies
        run: |
          pip install openai-whisper edge-tts
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg bc fonts-montserrat
          mkdir -p ~/.fonts
          wget -q -O ~/.fonts/Montserrat-Black.ttf "https://github.com/google/fonts/raw/main/ofl/montserrat/static/Montserrat-Black.ttf" || true
          fc-cache -f

      - name: Download assets
        run: |
          download() {
            local url="$1"
            local output="$2"
            local fallback="$3"
            url=$(echo "$url" | tr -d '"' | tr -d ' ' | sed 's/undefined//g' | sed 's/null//g')
            if [ -z "$url" ]; then url="$fallback"; fi
            
            curl -L -f --connect-timeout 30 --max-time 120 -o "$output" "$url" || true
            
            # Si el archivo pesa 0 o no existe, usamos el de emergencia
            if [ ! -s "$output" ] && [ -n "$fallback" ]; then
              echo "⚠️ Falló $output. Usando salvavidas..."
              curl -L -f -o "$output" "$fallback" || true
            fi
          }
          download "${{ github.event.client_payload.audio_url }}" "audio.wav" ""
          download "${{ github.event.client_payload.video_url }}" "background.mp4" "https://videos.pexels.com/video-files/3129671/3129671-hd_1080_1920_30fps.mp4"
          download "${{ github.event.client_payload.image_url }}" "overlay.png" "https://images.pexels.com/photos/3124111/pexels-photo-3124111.jpeg"

      - name: Audio Fallback (Si no hay audio)
        run: |
          if [ ! -s audio.wav ]; then
            echo "⚠️ Audio roto o vacío. Generando voz de emergencia..."
            TEXTO="${{ github.event.client_payload.script_text }}"
            if [ -z "$TEXTO" ] || [ "$TEXTO" == "null" ]; then TEXTO="Audio original falló, pero el video sigue adelante."; fi
            edge-tts --voice "es-ES-AlvaroNeural" --text "$TEXTO" --write-media audio.wav || true
          fi

      - name: Transcribe (Whisper)
        run: |
          echo "🎙 Transcribiendo..."
          whisper audio.wav --model small --language es --output_format json --word_timestamps True --output_dir . || true
          
          # BLINDAJE 1: Si whisper falla, creamos un archivo falso para que no explote Python
          if [ ! -f audio.json ]; then
            echo "⚠️ Creando audio.json de rescate..."
            echo '{"text": "Error", "segments": [{"start": 0.0, "end": 5.0, "text": "Sin subtitulos"}]}' > audio.json
          fi

      - name: Generate subtitles
        run: |
          python generate_subs.py || true
          
          # BLINDAJE 2: Si el código de Python falla, creamos unos subtítulos básicos de emergencia
          if [ ! -f subtitles.ass ]; then
            echo "⚠️ Creando subtitles.ass de rescate..."
            cat << 'EOF' > subtitles.ass
            [Script Info]
            ScriptType: v4.00+
            PlayResX: 1080
            PlayResY: 1920
            [V4+ Styles]
            Format: Name,Fontname,Fontsize,PrimaryColour,SecondaryColour,OutlineColour,BackColour,Bold,Italic,Underline,StrikeOut,ScaleX,ScaleY,Spacing,Angle,BorderStyle,Outline,Shadow,Alignment,MarginL,MarginR,MarginV,Encoding
            Style: Default,Montserrat Black,80,&H00FFFFFF,&H0000D7FF,&H00000000,&HBB000000,-1,0,0,0,100,100,0,0,1,4,2,2,60,60,538,1
            [Events]
            Format: Layer,Start,End,Style,Name,MarginL,MarginR,MarginV,Effect,Text
            Dialogue: 0,0:00:00.00,0:00:05.00,Default,,0,0,0,,ERROR DE AUDIO
            EOF
          fi

      - name: Render video
        run: |
          chmod +x render.sh
          bash render.sh || true
          
          # BLINDAJE 3: Si FFmpeg explota, usamos el video de fondo como resultado final para que no falle el upload
          if [ ! -f output.mp4 ]; then
            echo "⚠️ FFmpeg falló. Usando video de fondo como output..."
            cp background.mp4 output.mp4 || true
          fi

      - name: Upload result
        id: upload
        run: |
          URL=$(curl -f -F "reqtype=fileupload" -F "time=24h" -F "fileToUpload=@output.mp4" https://litterbox.catbox.moe/resources/internals/api.php 2>/dev/null || echo "")
          if echo "$URL" | grep -q "^https://"; then
            echo "video_url=$URL" >> $GITHUB_OUTPUT
          else
            URL=$(curl -f -F "reqtype=fileupload" -F "fileToUpload=@output.mp4" https://catbox.moe/user/api.php 2>/dev/null || echo "")
            echo "video_url=$URL" >> $GITHUB_OUTPUT
          fi

      - name: Notify Activepieces
        if: always()
        run: |
          if [ -n "${{ steps.upload.outputs.video_url }}" ]; then
            PAYLOAD="{\"status\":\"completed\",\"video_url\":\"${{ steps.upload.outputs.video_url }}\"}"
          else
            PAYLOAD="{\"status\":\"failed\"}"
          fi
          curl -sf -X POST "${{ secrets.WEBHOOK_URL }}" -H "Content-Type: application/json" -d "$PAYLOAD" || true
