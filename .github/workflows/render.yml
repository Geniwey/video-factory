- name: Render Video
        run: |
          DURATION=$(cat /tmp/audio_duration.txt)
          SAFE_DUR=$(printf '%.2f' "$DURATION")
          
          # Calculamos los frames exactos para el movimiento de la cámara
          FRAMES=$(echo "$DURATION * 30" | bc | awk '{print int($1+0.5)}')
          
          echo "🎬 Renderizando con Ken Burns (Duración: ${SAFE_DUR}s, Frames: ${FRAMES})"
          
          ffmpeg -y -stream_loop -1 -i background.mp4 -loop 1 -i overlay.png -i audio.wav -filter_complex "\
          [0:v]scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,setsar=1,eq=brightness=-0.08:saturation=0.9,format=rgba,colorchannelmixer=aa=0.15[pex];\
          [1:v]scale=8000:-1,zoompan=z='min(1.0+0.12*on/${FRAMES},1.12)':x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':d=${FRAMES}:s=1080x1920:fps=30[flux];\
          [flux][pex]overlay=0:0[merged];\
          [merged]ass=subtitles.ass[withsubs];\
          [withsubs]drawbox=x=0:y=0:w='min(iw,iw*t/${SAFE_DUR})':h=10:color=0xFFD700@0.95:t=fill[final]" \
          -map "[final]" -map 2:a -c:v libx264 -preset medium -crf 23 -pix_fmt yuv420p -c:a aac -b:a 192k -ar 44100 -movflags +faststart -t "$DURATION" output.mp4 || \
          ffmpeg -y -stream_loop -1 -i background.mp4 -i audio.wav -c:v libx264 -preset ultrafast -crf 25 -pix_fmt yuv420p -c:a aac -b:a 192k -t "$DURATION" output.mp4
