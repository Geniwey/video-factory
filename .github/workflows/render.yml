name: Render Short Video

on:
  repository_dispatch:
    types: [render-video]

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg bc file
          pip install --quiet openai-whisper edge-tts
          mkdir -p ~/.fonts
          wget -q -O ~/.fonts/Montserrat-Black.ttf \
            "https://github.com/google/fonts/raw/main/ofl/montserrat/static/Montserrat-Black.ttf" || true
          fc-cache -f

      - name: Download and prepare assets
        run: |
          set +e

          # Descargar video de fondo
          VIDEO_URL=$(echo "${{ github.event.client_payload.video_url }}" | tr -d '\r\n" ' | sed 's/^null$//i' | sed 's/^undefined$//i')
          if [ -n "$VIDEO_URL" ]; then
            echo "📥 Descargando video Pexels..."
            curl -L -f -A "Mozilla/5.0" --connect-timeout 20 --max-time 120 -o pexels.mp4 "$VIDEO_URL" 2>/dev/null
          fi

          # Verificar que el video es real
          if [ -s "pexels.mp4" ]; then
            mime=$(file -b --mime-type pexels.mp4 2>/dev/null)
            if echo "$mime" | grep -q "video"; then
              echo "✅ Video Pexels OK ($(wc -c < pexels.mp4) bytes)"
            else
              echo "⚠️ No es video real, descartando"
              rm -f pexels.mp4
            fi
          fi

          # Si no hay video, generar fondo oscuro animado
          if [ ! -s "pexels.mp4" ]; then
            echo "🎨 Generando fondo oscuro..."
            ffmpeg -y -f lavfi \
              -i "color=c=0x0a0e27:s=1080x1920:d=60:r=30" \
              -vf "vignette=PI/2.5,noise=alls=4:allf=t,eq=brightness=-0.05:contrast=1.2" \
              -c:v libx264 -preset ultrafast -crf 28 -pix_fmt yuv420p \
              -t 60 pexels.mp4 2>/dev/null || true
          fi

          # Generar audio con Edge-TTS
          TEXTO="${{ github.event.client_payload.script_text }}"
          if [ -z "$TEXTO" ]; then
            TEXTO="Lo que acaba de pasar en tecnologia va a cambiar todo y nadie te lo esta contando"
          fi
          echo "$TEXTO" | head -c 5000 > script.txt

          echo "🎙️ Generando voz..."
          edge-tts \
            --voice "es-ES-AlvaroNeural" \
            --rate="+5%" \
            --pitch="-3Hz" \
            --file script.txt \
            --write-media audio.mp3 2>/dev/null || true

          if [ -s "audio.mp3" ]; then
            ffmpeg -y -i audio.mp3 -acodec pcm_s16le -ar 44100 -ac 1 audio.wav 2>/dev/null
            echo "✅ Audio generado"
          fi

          # Emergencia si no hay audio
          if [ ! -s "audio.wav" ]; then
            echo "⚠️ Audio de emergencia"
            ffmpeg -y -f lavfi -i anullsrc=r=44100:cl=mono -t 5 -c:a pcm_s16le audio.wav 2>/dev/null
          fi

          # Guardar duracion
          DURATION=$(ffprobe -v quiet -show_entries format=duration \
            -of default=noprint_wrappers=1:nokey=1 audio.wav 2>/dev/null || echo "5")
          [ -z "$DURATION" ] || [ "$DURATION" = "N/A" ] && DURATION="5"
          echo "$DURATION" > dur.txt
          echo "⏱️ Duración: ${DURATION}s"

      - name: Generate subtitles
        run: |
          set +e
          echo "📝 Transcribiendo..."

          whisper audio.wav \
            --model small \
            --language es \
            --output_format json \
            --word_timestamps True \
            --output_dir . 2>/dev/null || true

          cat << 'PYEOF' > gen_subs.py
          import json, os

          def generate():
              if not os.path.exists("audio.json"):
                  return False

              with open("audio.json") as f:
                  data = json.load(f)

              words = []
              for seg in data.get("segments", []):
                  for w in seg.get("words", []):
                      if w.get("word", "").strip():
                          words.append(w)

              if len(words) < 2:
                  return False

              header = "[Script Info]\n"
              header += "ScriptType: v4.00+\n"
              header += "PlayResX: 1080\n"
              header += "PlayResY: 1920\n\n"
              header += "[V4+ Styles]\n"
              header += "Format: Name, Fontname, Fontsize, PrimaryColour, SecondaryColour, OutlineColour, BackColour, Bold, Italic, Underline, StrikeOut, ScaleX, ScaleY, Spacing, Angle, BorderStyle, Outline, Shadow, Alignment, MarginL, MarginR, MarginV, Encoding\n"
              header += "Style: Default,Montserrat Black,90,&H00FFFFFF,&H0000D7FF,&H00000000,&HBB000000,-1,0,0,0,100,100,0,0,1,4,2,2,60,60,700,1\n\n"
              header += "[Events]\n"
              header += "Format: Layer, Start, End, Style, Name, MarginL, MarginR, MarginV, Effect, Text\n"

              def fmt(s):
                  h = int(s // 3600)
                  m = int((s % 3600) // 60)
                  sec = int(s % 60)
                  cs = min(int(round((s % 1) * 100)), 99)
                  return f"{h}:{m:02d}:{sec:02d}.{cs:02d}"

              lines = []
              for i in range(0, len(words), 3):
                  chunk = words[i:i + 3]
                  if not chunk:
                      continue
                  for j, cw in enumerate(chunk):
                      parts = []
                      for k, w in enumerate(chunk):
                          clean = w["word"].strip().upper().replace("{", "").replace("}", "")
                          if k == j:
                              parts.append("{\\c&H0000D7FF\\fscx115\\fscy115}" + clean + "{\\c&H00FFFFFF\\fscx100\\fscy100}")
                          else:
                              parts.append(clean)
                      lines.append(f"Dialogue: 0,{fmt(cw['start'])},{fmt(cw['end'])},Default,,0,0,0,,{' '.join(parts)}")

              with open("subtitles.ass", "w") as f:
                  f.write(header)
                  for line in lines:
                      f.write(line + "\n")

              print(f"OK {len(lines)} lineas")
              return True

          try:
              if not generate():
                  raise Exception("sin datos")
          except Exception as e:
              print(f"Fallback: {e}")
              fb = "[Script Info]\n"
              fb += "ScriptType: v4.00+\n"
              fb += "PlayResX: 1080\n"
              fb += "PlayResY: 1920\n\n"
              fb += "[V4+ Styles]\n"
              fb += "Format: Name, Fontname, Fontsize, PrimaryColour, SecondaryColour, OutlineColour, BackColour, Bold, Italic, Underline, StrikeOut, ScaleX, ScaleY, Spacing, Angle, BorderStyle, Outline, Shadow, Alignment, MarginL, MarginR, MarginV, Encoding\n"
              fb += "Style: Default,Montserrat,80,&H00FFFFFF,&H0000D7FF,&H00000000,&HBB000000,-1,0,0,0,100,100,0,0,1,4,2,2,60,60,700,1\n\n"
              fb += "[Events]\n"
              fb += "Format: Layer, Start, End, Style, Name, MarginL, MarginR, MarginV, Effect, Text\n"
              fb += "Dialogue: 0,0:00:00.00,0:00:05.00,Default,,0,0,0,,\n"
              with open("subtitles.ass", "w") as f:
                  f.write(fb)
          PYEOF

          python3 gen_subs.py || true

      - name: Render final video
        run: |
          set +e
          DUR=$(cat dur.txt)
          SAFE_DUR=$(printf '%.2f' "$DUR")

          echo "🎬 Renderizando..."

          # INTENTO 1: Fondo Pexels + Subtitulos + Barra de progreso
          ffmpeg -y \
            -stream_loop -1 -i pexels.mp4 \
            -i audio.wav \
            -filter_complex "\
              [0:v]scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,setsar=1,eq=brightness=-0.08:saturation=1.1[bg]; \
              [bg]ass=subtitles.ass[subs]; \
              [subs]drawbox=x=0:y=0:w='min(iw\,iw*t/${SAFE_DUR})':h=10:color=0xFFD700@0.9:t=fill[final]" \
            -map "[final]" \
            -map 1:a \
            -c:v libx264 -preset medium -crf 20 -pix_fmt yuv420p \
            -c:a aac -b:a 192k -ar 44100 \
            -movflags +faststart \
            -t "$DUR" \
            output.mp4 2>/tmp/r1.log

          if [ $? -eq 0 ] && [ -s "output.mp4" ]; then
            echo "✅ Render completo"
          else
            echo "⚠️ Fallo render 1, intentando sin subs..."
            tail -5 /tmp/r1.log 2>/dev/null || true

            # INTENTO 2: Fondo + Audio (sin subtitulos)
            ffmpeg -y \
              -stream_loop -1 -i pexels.mp4 \
              -i audio.wav \
              -filter_complex "\
                [0:v]scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920[final]" \
              -map "[final]" \
              -map 1:a \
              -c:v libx264 -preset fast -crf 23 -pix_fmt yuv420p \
              -c:a aac -b:a 192k \
              -t "$DUR" \
              output.mp4 2>/dev/null

            if [ $? -eq 0 ] && [ -s "output.mp4" ]; then
              echo "✅ Render sin subs"
            else
              # INTENTO 3: Emergencia total
              echo "⚠️ Emergencia..."
              ffmpeg -y \
                -f lavfi -i "color=c=0x0a0e27:s=1080x1920:d=${DUR}:r=30" \
                -i audio.wav \
                -c:v libx264 -preset ultrafast -crf 28 -pix_fmt yuv420p \
                -c:a aac -b:a 128k \
                -t "$DUR" -shortest \
                output.mp4 2>/dev/null || true
            fi
          fi

          [ -s "output.mp4" ] && echo "📦 Video: $(du -h output.mp4 | cut -f1)" || { echo "❌ FALLO"; exit 1; }

      - name: Upload video
        id: upload
        run: |
          set +e
          echo "📤 Subiendo..."

          for i in 1 2 3; do
            URL=$(curl -f -A "Mozilla/5.0" --connect-timeout 30 --max-time 300 \
              -F "reqtype=fileupload" \
              -F "time=24h" \
              -F "fileToUpload=@output.mp4" \
              "https://litterbox.catbox.moe/resources/internals/api.php" 2>/dev/null || echo "")

            if echo "$URL" | grep -q "^https://"; then
              echo "✅ $URL"
              echo "video_url=$URL" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "   Reintentando en 10s..."
            sleep 10
          done

          echo "video_url=UPLOAD_FAILED" >> $GITHUB_OUTPUT
          exit 0

      - name: Artifact backup
        if: steps.upload.outputs.video_url == 'UPLOAD_FAILED'
        uses: actions/upload-artifact@v4
        with:
          name: video-final
          path: output.mp4
          retention-days: 1

      - name: Webhook
        if: always()
        run: |
          set +e
          WH="${{ secrets.WEBHOOK_URL }}"
          [ -z "$WH" ] && exit 0
          VR="${{ steps.upload.outputs.video_url }}"
          ST="completed"
          [ "$VR" = "UPLOAD_FAILED" ] && ST="failed"
          [ -z "$VR" ] && ST="failed"
          curl -sf -X POST "$WH" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"$ST\",\"video_url\":\"$VR\"}" 2>/dev/null || true
          exit 0
