name: Render Short Video

on:
  repository_dispatch:
    types: [render-video]

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: ~/.cache/whisper
          key: whisper-small-v3

      - name: Install dependencies
        run: |
          pip install openai-whisper edge-tts
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg bc fonts-montserrat
          mkdir -p ~/.fonts
          wget -q -O ~/.fonts/Montserrat-Black.ttf "https://github.com/google/fonts/raw/main/ofl/montserrat/static/Montserrat-Black.ttf" || true
          fc-cache -f
          echo "✅ Dependencias instaladas"

      - name: Download assets
        run: |
          download() {
            local url="$1"
            local output="$2"
            echo "📥 Descargando $output..."
            if curl -L -f --connect-timeout 30 --max-time 120 -o "$output" "$url"; then
              echo "✅ $output listo"
            else
              echo "⚠️ Falló la descarga de $output. No es crítico, pero el render podría fallar."
            fi
          }
          download "${{ github.event.client_payload.audio_url }}" "audio.wav"
          download "${{ github.event.client_payload.video_url }}" "background.mp4"
          download "${{ github.event.client_payload.image_url }}" "overlay.png"

      - name: TTS fallback
        if: hashFiles('audio.wav') == ''
        run: |
          echo "⚠️ Audio no disponible. Generando con Edge-TTS..."
          echo '${{ github.event.client_payload.script_text }}' > script.txt
          edge-tts --voice "es-ES-AlvaroNeural" --rate "+5%" --pitch "-3Hz" --file script.txt --write-media audio.wav
          echo "✅ Audio generado con Edge-TTS"

      - name: Transcribe
        run: |
          # Solo transcribimos si el archivo de audio es mayor de 1KB
          if [ $(stat -c%s audio.wav) -gt 1024 ]; then
            whisper audio.wav --model small --language ${{ github.event.client_payload.language || 'es' }} --output_format json --word_timestamps True --output_dir .
          else
            echo "⚠️ Audio demasiado corto. Usando subtítulos vacíos."
            echo '[{"start":0,"end":10,"text":"Audio Error"}]' > audio.json
          fi

      - name: Generate subtitles
        run: python generate_subs.py

      - name: Render video
        run: |
          echo "🛠 Verificando archivos para el render..."
          ls -lh audio.wav background.mp4 overlay.png subtitles.ass
          chmod +x render.sh
          # Usamos bash render.sh pero no paramos el flujo si FFmpeg falla, 
          # para poder hacer el upload y el webhook
          bash render.sh || true
          echo "🛠 Render finalizado."

      - name: Upload result
        id: upload
        run: |
          for i in 1 2 3; do
            echo "📤 Litterbox (intento $i/3)..."
            URL=$(curl -f --max-time 180 -F "reqtype=fileupload" -F "time=24h" -F "fileToUpload=@output.mp4" https://litterbox.catbox.moe/resources/internals/api.php 2>/dev/null) \
              && echo "$URL" | grep -q "^https://" \
              && { echo "video_url=$URL" >> $GITHUB_OUTPUT; echo "✅ $URL"; exit 0; }
            sleep 15
          done
          echo "📤 Fallback: Catbox permanente..."
          URL=$(curl -f --max-time 300 -F "reqtype=fileupload" -F "fileToUpload=@output.mp4" https://catbox.moe/user/api.php 2>/dev/null)
          if echo "$URL" | grep -q "^https://"; then
            echo "video_url=$URL" >> $GITHUB_OUTPUT
            echo "✅ $URL"
          else
            echo "❌ Ambos servicios fallaron"
            exit 1
          fi

      - name: Notify Activepieces
        if: always()
        run: |
          if [ -n "${{ steps.upload.outputs.video_url }}" ]; then
            STATUS="completed"
            PAYLOAD="{\"status\":\"$STATUS\",\"video_url\":\"${{ steps.upload.outputs.video_url }}\",\"title\":\"${{ github.event.client_payload.title }}\",\"description\":\"${{ github.event.client_payload.description }}\"}"
          else
            STATUS="failed"
            PAYLOAD="{\"status\":\"$STATUS\",\"error\":\"Render o upload falló\"}"
          fi
          curl -sf -X POST "${{ secrets.WEBHOOK_URL }}" -H "Content-Type: application/json" -d "$PAYLOAD" || echo "⚠️ Webhook falló"
