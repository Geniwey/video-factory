name: Render Short Diagnostic

on:
  repository_dispatch:
    types: [render-video]

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup minimal
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg bc
          pip install --quiet edge-tts
          echo "🔧 Entorno mínimo listo"

      - name: Download ONLY the image
        run: |
          echo "📥 Descargando SOLO la imagen..."
          echo "URL recibida: ${{ github.event.client_payload.image_url }}"

          # Limpieza EXTREMA de la URL
          CLEAN_URL=$(echo "${{ github.event.client_payload.image_url }}" | tr -d '\r\n" ' | sed 's/^undefined$//i' | sed 's/^null$//i')

          if [ -z "$CLEAN_URL" ]; then
            echo "❌ ERROR: URL de imagen VACÍA"
            echo "HAS_IMAGE=false" >> $GITHUB_ENV
            exit 0
          fi

          echo "URL limpia: $CLEAN_URL"

          curl -L -f -A "Mozilla/5.0" --connect-timeout 20 --max-time 60 -o overlay.jpg "$CLEAN_URL" 2>/dev/null

          if [ -s "overlay.jpg" ]; then
            echo "✅ Imagen descargada: $(wc -c < overlay.jpg) bytes"
            echo "HAS_IMAGE=true" >> $GITHUB_ENV
            file overlay.jpg
          else
            echo "❌ ERROR: No se pudo descargar la imagen"
            echo "HAS_IMAGE=false" >> $GITHUB_ENV
          fi

      - name: Generate audio from text
        run: |
          echo "🎙️ Generando audio con Edge-TTS..."
          echo "${{ github.event.client_payload.script_text || 'Contenido de tecnología importante' }}" > /tmp/script.txt

          edge-tts \
            --voice "es-ES-AlvaroNeural" \
            --rate="+5%" \
            --pitch="-3Hz" \
            --file /tmp/script.txt \
            --write-media audio.mp3 2>/dev/null || true

          if [ -s "audio.mp3" ]; then
            ffmpeg -y -i audio.mp3 -acodec pcm_s16le -ar 44100 -ac 1 audio.wav 2>/dev/null
            echo "✅ Audio generado"
          else
            echo "⚠️ Generando silencio de emergencia"
            ffmpeg -y -f lavfi -i anullsrc=r=44100:cl=mono -t 5 -c:a pcm_s16le audio.wav 2>/dev/null
          fi

          DURATION=$(ffprobe -v quiet -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 audio.wav 2>/dev/null || echo "5")
          echo "$DURATION" > /tmp/duration.txt
          echo "⏱️ Duración: ${DURATION}s"

      - name: Render MINIMAL video (SOLO IMAGEN + AUDIO)
        run: |
          echo "🎬 Renderizando vídeo MÍNIMO..."

          DURATION=$(cat /tmp/duration.txt)
          FRAMES=$(echo "$DURATION * 30" | bc 2>/dev/null | awk '{print int($1+0.5)}' || echo "150")
          [ "$FRAMES" -lt 30 ] && FRAMES=150

          if [ "${{ env.HAS_IMAGE }}" = "true" ]; then
            echo "🖼️ Usando imagen descargada"

            # Versión ULTRA-SIMPLE sin escalado 8K
            ffmpeg -y \
              -i overlay.jpg \
              -filter_complex "\
                [0:v]scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,\
                zoompan=z='min(1.0+0.15*on/${FRAMES},1.15)':x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':d=${FRAMES}:s=1080x1920:fps=30[v]" \
              -map "[v]" \
              -c:v libx264 -preset fast -crf 23 -pix_fmt yuv420p \
              -t "$DURATION" \
              ken_burns.mp4 2>/dev/null

            if [ -s "ken_burns.mp4" ]; then
              echo "✅ Ken Burns generado correctamente"
              ffmpeg -y -i ken_burns.mp4 -i audio.wav -c:v copy -c:a aac -b:a 192k output.mp4 2>/dev/null
            else
              echo "❌ ERROR: ken_burns.mp4 está vacío o corrupto"
              ffmpeg -y -f lavfi -i "color=c=red:s=1080x1920:d=${DURATION}:r=30" -i audio.wav -c:v libx264 -c:a aac output.mp4 2>/dev/null
            fi
          else
            echo "⚠️ Usando fondo rojo de emergencia (no había imagen)"
            ffmpeg -y -f lavfi -i "color=c=red:s=1080x1920:d=${DURATION}:r=30" -i audio.wav -c:v libx264 -c:a aac output.mp4 2>/dev/null
          fi

      - name: Upload diagnostic video
        id: upload
        run: |
          echo "📤 Subiendo vídeo de diagnóstico..."

          for i in 1 2 3; do
            URL=$(curl -f -A "Mozilla/5.0" --connect-timeout 30 --max-time 60 \
              -F "reqtype=fileupload" -F "time=24h" -F "fileToUpload=@output.mp4" \
              "https://litterbox.catbox.moe/resources/internals/api.php" 2>/dev/null || echo "")

            if echo "$URL" | grep -q "^https://"; then
              echo "✅ Vídeo subido: $URL"
              echo "video_url=$URL" >> $GITHUB_OUTPUT
              break
            fi
            sleep 5
          done

          if [ -z "$URL" ]; then
            echo "video_url=UPLOAD_FAILED" >> $GITHUB_OUTPUT
          fi

      - name: Diagnostic report
        run: |
          echo "📋 === INFORME DE DIAGNÓSTICO ==="
          echo ""
          echo "🔍 URL de imagen recibida: ${{ github.event.client_payload.image_url }}"
          echo "📥 Imagen descargada: ${{ env.HAS_IMAGE }}"
          echo "🎬 Duración del audio: $(cat /tmp/duration.txt)s"
          echo "📁 Tamaño del vídeo final: $(du -h output.mp4 | cut -f1)"
          echo ""
          echo "🔗 Vídeo final: ${{ steps.upload.outputs.video_url }}"
          echo ""
          echo "💡 POSIBLES RESULTADOS:"
          echo "   ✅ Si ves la imagen IA con zoom → El problema era el escalado 8K"
          echo "   ❌ Si ves fondo rojo → La URL de la imagen no llega bien a GitHub"
          echo "   ❌ Si el vídeo está corrupto → Problema con la descarga de la imagen"
          echo "════════════════════════════════════════════════════════════════"
