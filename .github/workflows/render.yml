name: Render Short Video

on:
  repository_dispatch:
    types: [render-video]

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      LANG_CODE: ${{ github.event.client_payload.language || 'es' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: ~/.cache/whisper
          key: whisper-small-v3

      - name: Install dependencies
        run: |
          pip install --quiet openai-whisper edge-tts
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg bc
          
          mkdir -p ~/.fonts
          wget -q -O ~/.fonts/Montserrat-Black.ttf "https://github.com/google/fonts/raw/main/ofl/montserrat/static/Montserrat-Black.ttf" || true
          fc-cache -f

      - name: Download assets (Extreme Shield)
        run: |
          download_asset() {
            local raw_url="$1"
            local output="$2"
            local fallback_url="$3"
            local attempt=1
            
            # Sanitización EXTREMA en Bash: fuera comillas, espacios y saltos de línea
            local url=$(echo "$raw_url" | tr -d '\r\n" ' | sed 's/^undefined$//i' | sed 's/^null$//i')
            
            if [ -z "$url" ]; then
              echo "⚠️ URL recibida vacía para $output. Usando fallback..."
              url="$fallback_url"
            fi

            while [ $attempt -le 3 ]; do
              echo "📥 Descargando $output (intento $attempt/3)..."
              
              # El disfraz: User-Agent de Chrome en Windows
              HTTP_CODE=$(curl -L -f \
                -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
                --connect-timeout 20 \
                --max-time 120 \
                -w "%{http_code}" \
                -o "$output" \
                "$url" 2>/dev/null) || HTTP_CODE="000"

              if [ -f "$output" ]; then
                local size=$(stat --printf="%s" "$output" 2>/dev/null || echo "0")
                if [ "$size" -gt 5000 ]; then
                  echo "✅ $output descargado con éxito [HTTP $HTTP_CODE]"
                  return 0
                fi
                rm -f "$output" # Borrar si es un archivo corrupto de 1 byte
              fi
              
              echo "⚠️ Intento $attempt falló [HTTP $HTTP_CODE]"
              sleep 5
              attempt=$((attempt + 1))
            done

            # Fallback final si la URL original falló 3 veces
            if [ "$url" != "$fallback_url" ] && [ -n "$fallback_url" ]; then
              echo "🔄 Intentando URL de emergencia..."
              curl -L -f -A "Mozilla/5.0" -o "$output" "$fallback_url" 2>/dev/null
              if [ -f "$output" ] && [ "$(stat --printf='%s' "$output")" -gt 5000 ]; then
                return 0
              fi
            fi
            
            echo "❌ No se pudo descargar $output"
            # Creamos un archivo vacío para que no estalle el siguiente paso, se manejará en Normalize
            touch "$output"
          }

          download_asset "${{ github.event.client_payload.audio_url }}" "audio_original" ""
          download_asset "${{ github.event.client_payload.video_url }}" "background_original.mp4" "https://videos.pexels.com/video-files/3129671/3129671-hd_1080_1920_30fps.mp4"
          download_asset "${{ github.event.client_payload.image_url }}" "overlay_original" "https://images.pexels.com/photos/7130560/pexels-photo-7130560.jpeg?w=1080"

      - name: TTS fallback if needed
        run: |
          if [ -s "audio_original" ]; then
            echo "✅ Audio existe."
          else
            echo "⚠️ Audio vacío. Generando con Edge-TTS..."
            SCRIPT_TEXT="${{ github.event.client_payload.script_text }}"
            [ -z "$SCRIPT_TEXT" ] && SCRIPT_TEXT="Error en el guion, audio de emergencia."
            echo "$SCRIPT_TEXT" > /tmp/script.txt
            edge-tts --voice "es-ES-AlvaroNeural" --rate "+5%" --pitch "-3Hz" --file /tmp/script.txt --write-media audio_original
          fi

      - name: Normalize asset formats
        run: |
          ffmpeg -y -i audio_original -acodec pcm_s16le -ar 44100 -ac 1 audio.wav 2>/dev/null
          DURATION=$(ffprobe -v quiet -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 audio.wav || echo "10")
          echo "$DURATION" > /tmp/audio_duration.txt

          if [ -s overlay_original ] && ffprobe -v quiet overlay_original; then
            ffmpeg -y -i overlay_original -vf "scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920" -pix_fmt rgba overlay.png 2>/dev/null || ffmpeg -y -f lavfi -i "color=c=black:s=1080x1920:d=1" -frames:v 1 overlay.png
          else
            ffmpeg -y -f lavfi -i "color=c=black:s=1080x1920:d=1" -frames:v 1 overlay.png
          fi

          if [ -s background_original.mp4 ] && ffprobe -v quiet background_original.mp4; then
            cp background_original.mp4 background.mp4
          else
            ffmpeg -y -f lavfi -i "color=c=0x1a1a2e:s=1080x1920:d=$DURATION,format=yuv420p" -c:v libx264 -preset ultrafast -t "$DURATION" background.mp4
          fi

      - name: Transcribe with Whisper
        run: |
          whisper audio.wav --model small --language "${{ env.LANG_CODE }}" --output_format json --word_timestamps True --output_dir . 2>&1 | tail -5 || true
          if [ ! -f "audio.json" ]; then
            DURATION=$(cat /tmp/audio_duration.txt)
            echo '{"segments": [{"start": 0, "end": '$DURATION', "text": "Error transcripcion", "words": [{"word": "Error", "start": 0.0, "end": '$DURATION'}]}]}' > audio.json
          fi
        env:
          SCRIPT_TEXT: ${{ github.event.client_payload.script_text }}

      - name: Generate subtitles
        run: |
          python3 generate_subs.py || python3 generate_subs_fallback.py
          if [ ! -f "subtitles.ass" ]; then
            cat > subtitles.ass << 'ASSEOF'
          [Script Info]
          Title: Empty
          ScriptType: v4.00+
          PlayResX: 1080
          PlayResY: 1920
          [V4+ Styles]
          Format: Name, Fontname, Fontsize, PrimaryColour, SecondaryColour, OutlineColour, BackColour, Bold, Italic, Underline, StrikeOut, ScaleX, ScaleY, Spacing, Angle, BorderStyle, Outline, Shadow, Alignment, MarginL, MarginR, MarginV, Encoding
          Style: Default,Montserrat,80,&H00FFFFFF,&H0000D7FF,&H00000000,&HBB000000,-1,0,0,0,100,100,0,0,1,4,2,2,60,60,538,1
          [Events]
          Format: Layer, Start, End, Style, Name, MarginL, MarginR, MarginV, Effect, Text
          ASSEOF
          fi

      - name: Render video
        run: |
          chmod +x render.sh
          bash render.sh

      - name: Upload result
        id: upload
        run: |
          VIDEO_URL=""
          for i in 1 2 3; do
            RESULT=$(curl -f -A "Mozilla/5.0" --connect-timeout 30 --max-time 300 -F "reqtype=fileupload" -F "time=24h" -F "fileToUpload=@output.mp4" "https://litterbox.catbox.moe/resources/internals/api.php" 2>/dev/null) || RESULT=""
            if echo "$RESULT" | grep -q "^https://"; then
              VIDEO_URL="$RESULT"
              break
            fi
            sleep 10
          done
          
          if [ -z "$VIDEO_URL" ]; then
            RESULT=$(curl -f -A "Mozilla/5.0" --connect-timeout 30 --max-time 300 -F "reqtype=fileupload" -F "fileToUpload=@output.mp4" "https://catbox.moe/user/api.php" 2>/dev/null) || RESULT=""
            if echo "$RESULT" | grep -q "^https://"; then VIDEO_URL="$RESULT"; fi
          fi
          
          if [ -z "$VIDEO_URL" ]; then
            echo "video_url=ARTIFACT" >> $GITHUB_OUTPUT
            echo "upload_failed=true" >> $GITHUB_OUTPUT
          else
            echo "video_url=$VIDEO_URL" >> $GITHUB_OUTPUT
            echo "upload_failed=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifact fallback
        if: steps.upload.outputs.upload_failed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video-${{ github.run_id }}
          path: output.mp4
          retention-days: 3

      - name: Notify Activepieces
        if: always()
        run: |
          WEBHOOK_URL="${{ secrets.WEBHOOK_URL }}"
          if [ -z "$WEBHOOK_URL" ]; then exit 0; fi
          VIDEO_URL="${{ steps.upload.outputs.video_url }}"
          if [ -n "$VIDEO_URL" ] && [ "$VIDEO_URL" != "ARTIFACT" ]; then
            PAYLOAD="{\"status\":\"completed\",\"video_url\":\"$VIDEO_URL\"}"
          else
            PAYLOAD="{\"status\":\"failed\"}"
          fi
          curl -sf -X POST "$WEBHOOK_URL" -H "Content-Type: application/json" -d "$PAYLOAD" || true
