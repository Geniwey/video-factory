name: Render Short Video

on:
  repository_dispatch:
    types: [render-video]

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      LANG_CODE: ${{ github.event.client_payload.language || 'es' }}
      SCRIPT_TEXT: ${{ github.event.client_payload.script_text }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --quiet openai-whisper edge-tts
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg bc file
          mkdir -p ~/.fonts
          wget -q -O ~/.fonts/Montserrat-Black.ttf \
            "https://github.com/google/fonts/raw/main/ofl/montserrat/static/Montserrat-Black.ttf" || true
          fc-cache -f

      - name: Download Assets
        run: |
          download_asset() {
            local raw_url="$1"
            local output="$2"
            local url
            url=$(echo "$raw_url" | tr -d '\r\n" ' | sed 's/^undefined$//i' | sed 's/^null$//i')
            if [ -z "$url" ]; then
              echo "⚠️ URL vacia para $output"
              return 0
            fi
            echo "📥 Descargando $output..."
            curl -L -f -A "Mozilla/5.0" --connect-timeout 20 --max-time 120 -o "$output" "$url" 2>/dev/null || true
            if [ -s "$output" ]; then
              local mime
              mime=$(file -b --mime-type "$output" 2>/dev/null || echo "unknown")
              echo "   Tipo: $mime Tamaño: $(wc -c < "$output") bytes"
              if echo "$mime" | grep -q "text/html"; then
                echo "   ❌ Es HTML"
                rm -f "$output"
              fi
            else
              rm -f "$output"
            fi
            return 0
          }

          download_asset "${{ github.event.client_payload.audio_url }}" "audio_original"
          download_asset "${{ github.event.client_payload.video_url }}" "background_original.mp4"
          download_asset "${{ github.event.client_payload.image_url }}" "overlay_original"
          ls -la audio_original background_original.mp4 overlay_original 2>/dev/null || true

      - name: Audio Processing
        run: |
          AUDIO_OK="false"

          if [ -s "audio_original" ]; then
            echo "🎵 Procesando audio descargado..."
            if ffmpeg -y -i audio_original -acodec pcm_s16le -ar 44100 -ac 1 audio.wav 2>/dev/null; then
              AUDIO_OK="true"
              echo "✅ Audio convertido"
            fi
          fi

          if [ "$AUDIO_OK" = "false" ]; then
            echo "🎙️ Generando audio con Edge-TTS..."
            SAFE_TEXT=$(echo "${SCRIPT_TEXT:-Contenido de tecnologia}" | head -c 5000)
            echo "$SAFE_TEXT" > /tmp/script.txt
            edge-tts \
              --voice "es-ES-AlvaroNeural" \
              --rate="+5%" \
              --pitch="-3Hz" \
              --file /tmp/script.txt \
              --write-media temp_tts.mp3 2>/dev/null || true
            if [ -s "temp_tts.mp3" ]; then
              ffmpeg -y -i temp_tts.mp3 -acodec pcm_s16le -ar 44100 -ac 1 audio.wav 2>/dev/null || true
              echo "✅ Audio TTS generado"
            fi
          fi

          if [ ! -s "audio.wav" ]; then
            echo "⚠️ Audio de emergencia"
            ffmpeg -y -f lavfi -i anullsrc=r=44100:cl=mono -t 5 -c:a pcm_s16le audio.wav 2>/dev/null || true
          fi

          DURATION=$(ffprobe -v quiet -show_entries format=duration \
            -of default=noprint_wrappers=1:nokey=1 audio.wav 2>/dev/null || echo "5")
          if [ -z "$DURATION" ] || [ "$DURATION" = "N/A" ]; then
            DURATION="5"
          fi
          echo "$DURATION" > /tmp/audio_duration.txt
          echo "⏱️ Duracion: ${DURATION}s"

      - name: Prepare Image for Ken Burns
        run: |
          echo "🖼️ Preparando imagen..."

          if [ -s "overlay_original" ]; then
            ffmpeg -y -i overlay_original \
              -vf "scale=4320:7680:force_original_aspect_ratio=decrease,pad=4320:7680:(ow-iw)/2:(oh-ih)/2:black" \
              -pix_fmt yuvj420p \
              overlay_large.jpg 2>/dev/null

            if [ -s "overlay_large.jpg" ]; then
              echo "✅ Imagen lista ($(du -h overlay_large.jpg | cut -f1))"
              echo "HAS_IMAGE=true" >> $GITHUB_ENV
            else
              echo "⚠️ Conversion fallo"
              echo "HAS_IMAGE=false" >> $GITHUB_ENV
            fi
          else
            echo "⚠️ No hay imagen"
            echo "HAS_IMAGE=false" >> $GITHUB_ENV
          fi

      - name: Prepare Background
        run: |
          DURATION=$(cat /tmp/audio_duration.txt)
          HAS_BG="false"

          if [ -s "background_original.mp4" ]; then
            if ffprobe -v quiet background_original.mp4 2>/dev/null; then
              HAS_BG="true"
              echo "✅ Video de fondo OK"
            fi
          fi

          if [ "$HAS_BG" = "false" ]; then
            echo "🎨 Generando fondo oscuro..."
            ffmpeg -y -f lavfi \
              -i "color=c=0x0a0e27:s=1080x1920:d=${DURATION}:r=30" \
              -vf "vignette=PI/2.5,noise=alls=3:allf=t,eq=brightness=-0.05:contrast=1.15" \
              -c:v libx264 -preset ultrafast -crf 28 -pix_fmt yuv420p \
              -t "$DURATION" background_original.mp4 2>/dev/null || true
            echo "✅ Fondo generado"
          fi

          echo "HAS_BG=$HAS_BG" >> $GITHUB_ENV

      - name: Create Ken Burns Video
        run: |
          DURATION=$(cat /tmp/audio_duration.txt)
          FRAMES=$(echo "$DURATION * 30" | bc | awk '{print int($1+0.5)}')
          if [ "$FRAMES" -lt 30 ]; then FRAMES=150; fi

          echo "🎥 Generando Ken Burns (${FRAMES} frames)..."

          if [ "${{ env.HAS_IMAGE }}" = "true" ] && [ -s "overlay_large.jpg" ]; then
            ffmpeg -y \
              -i overlay_large.jpg \
              -filter_complex \
              "[0:v]zoompan=z='min(1.0+0.12*on/${FRAMES},1.12)':x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':d=${FRAMES}:s=1080x1920:fps=30,format=yuv420p[final]" \
              -map "[final]" \
              -c:v libx264 -preset fast -crf 20 -pix_fmt yuv420p \
              -t "$DURATION" \
              ken_burns.mp4 2>/tmp/kb.log

            if [ $? -eq 0 ] && [ -s "ken_burns.mp4" ]; then
              echo "✅ Ken Burns generado ($(du -h ken_burns.mp4 | cut -f1))"
              echo "HAS_KB=true" >> $GITHUB_ENV
            else
              echo "⚠️ Ken Burns fallo"
              tail -5 /tmp/kb.log 2>/dev/null || true
              echo "HAS_KB=false" >> $GITHUB_ENV
            fi
          else
            echo "⚠️ Sin imagen, saltando Ken Burns"
            echo "HAS_KB=false" >> $GITHUB_ENV
          fi

      - name: Transcribe and Subtitles
        run: |
          echo "📝 Transcribiendo..."
          whisper audio.wav \
            --model small \
            --language "${LANG_CODE}" \
            --output_format json \
            --word_timestamps True \
            --output_dir . 2>/dev/null || true

          cat << 'PYEOF' > gen_subs.py
          import json, os

          def generate():
              if not os.path.exists("audio.json"):
                  return False
              with open("audio.json", "r") as f:
                  data = json.load(f)
              words = []
              for seg in data.get("segments", []):
                  for w in seg.get("words", []):
                      if w.get("word", "").strip():
                          words.append(w)
              if len(words) < 2:
                  return False

              header = "[Script Info]\n"
              header += "ScriptType: v4.00+\n"
              header += "PlayResX: 1080\n"
              header += "PlayResY: 1920\n\n"
              header += "[V4+ Styles]\n"
              header += "Format: Name, Fontname, Fontsize, PrimaryColour, SecondaryColour, OutlineColour, BackColour, Bold, Italic, Underline, StrikeOut, ScaleX, ScaleY, Spacing, Angle, BorderStyle, Outline, Shadow, Alignment, MarginL, MarginR, MarginV, Encoding\n"
              header += "Style: Default,Montserrat Black,80,&H00FFFFFF,&H0000D7FF,&H00000000,&HBB000000,-1,0,0,0,100,100,0,0,1,4,2,2,60,60,538,1\n\n"
              header += "[Events]\n"
              header += "Format: Layer, Start, End, Style, Name, MarginL, MarginR, MarginV, Effect, Text\n"

              def fmt(s):
                  h = int(s // 3600)
                  m = int((s % 3600) // 60)
                  sec = int(s % 60)
                  cs = min(int(round((s % 1) * 100)), 99)
                  return f"{h}:{m:02d}:{sec:02d}.{cs:02d}"

              lines = []
              for i in range(0, len(words), 3):
                  chunk = words[i:i+3]
                  if not chunk:
                      continue
                  for j, cw in enumerate(chunk):
                      parts = []
                      for k, w in enumerate(chunk):
                          clean = w["word"].strip().upper().replace("{","").replace("}","")
                          if k == j:
                              parts.append("{\\c&H0000D7FF\\fscx110\\fscy110}" + clean + "{\\c&H00FFFFFF\\fscx100\\fscy100}")
                          else:
                              parts.append(clean)
                      lines.append(f"Dialogue: 0,{fmt(cw['start'])},{fmt(cw['end'])},Default,,0,0,0,,{' '.join(parts)}")

              with open("subtitles.ass", "w") as f:
                  f.write(header)
                  for line in lines:
                      f.write(line + "\n")
              print(f"✅ {len(lines)} lineas de subtitulos")
              return True

          try:
              if not generate():
                  raise Exception("sin datos")
          except Exception as e:
              print(f"⚠️ Fallback: {e}")
              fb = "[Script Info]\nScriptType: v4.00+\nPlayResX: 1080\nPlayResY: 1920\n\n"
              fb += "[V4+ Styles]\n"
              fb += "Format: Name, Fontname, Fontsize, PrimaryColour, SecondaryColour, OutlineColour, BackColour, Bold, Italic, Underline, StrikeOut, ScaleX, ScaleY, Spacing, Angle, BorderStyle, Outline, Shadow, Alignment, MarginL, MarginR, MarginV, Encoding\n"
              fb += "Style: Default,Montserrat,80,&H00FFFFFF,&H0000D7FF,&H00000000,&HBB000000,-1,0,0,0,100,100,0,0,1,4,2,2,60,60,538,1\n\n"
              fb += "[Events]\n"
              fb += "Format: Layer, Start, End, Style, Name, MarginL, MarginR, MarginV, Effect, Text\n"
              fb += "Dialogue: 0,0:00:00.00,0:00:05.00,Default,,0,0,0,,\n"
              with open("subtitles.ass", "w") as f:
                  f.write(fb)
          PYEOF

          python3 gen_subs.py

      - name: Render Final Video
        run: |
          DURATION=$(cat /tmp/audio_duration.txt)
          SAFE_DUR=$(printf '%.2f' "$DURATION")

          echo "🎬 ═══════════════════════════════════"
          echo "🎬 RENDER FINAL — COMPOSICION POR CAPAS"
          echo "   Duracion: ${SAFE_DUR}s"
          echo "   Ken Burns: ${{ env.HAS_KB }}"
          echo "🎬 ═══════════════════════════════════"

          RENDER_OK="false"

          # ═══════════════════════════════════════════════════
          # INTENTO 1: Ken Burns + Fondo Pexels + Subs + Barra
          # Estrategia: Ken Burns ya es un VIDEO (ken_burns.mp4)
          # Lo mezclamos con el fondo como dos videos normales
          # SIN problemas de alfa
          # ═══════════════════════════════════════════════════
          if [ "${{ env.HAS_KB }}" = "true" ] && [ -s "ken_burns.mp4" ]; then
            echo ""
            echo "🎥 INTENTO 1: Completo (KB + Fondo + Subs + Barra)"

            ffmpeg -y \
              -i ken_burns.mp4 \
              -stream_loop -1 -i background_original.mp4 \
              -i audio.wav \
              -filter_complex "\
                [1:v]scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,setsar=1,format=yuva420p,colorchannelmixer=aa=0.12[bg]; \
                [0:v]setsar=1[main]; \
                [main][bg]overlay=0:0:format=yuv420[merged]; \
                [merged]ass=subtitles.ass[withsubs]; \
                [withsubs]drawbox=x=0:y=0:w='min(iw\,iw*t/${SAFE_DUR})':h=8:color=0xFFD700@0.9:t=fill[final]" \
              -map "[final]" \
              -map 2:a \
              -c:v libx264 -preset medium -crf 23 -pix_fmt yuv420p \
              -c:a aac -b:a 192k -ar 44100 \
              -movflags +faststart \
              -t "$DURATION" \
              output.mp4 2>/tmp/r1.log

            if [ $? -eq 0 ] && [ -s "output.mp4" ]; then
              RENDER_OK="true"
              echo "   ✅ RENDER COMPLETO EXITOSO"
            else
              echo "   ⚠️ Fallo"
              tail -5 /tmp/r1.log 2>/dev/null || true
            fi
          fi

          # ═══════════════════════════════════════════════════
          # INTENTO 2: Ken Burns + Fondo (sin subtitulos)
          # ═══════════════════════════════════════════════════
          if [ "$RENDER_OK" = "false" ] && [ "${{ env.HAS_KB }}" = "true" ] && [ -s "ken_burns.mp4" ]; then
            echo ""
            echo "🎥 INTENTO 2: KB + Fondo (sin subs)"

            ffmpeg -y \
              -i ken_burns.mp4 \
              -stream_loop -1 -i background_original.mp4 \
              -i audio.wav \
              -filter_complex "\
                [1:v]scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,setsar=1,format=yuva420p,colorchannelmixer=aa=0.12[bg]; \
                [0:v]setsar=1[main]; \
                [main][bg]overlay=0:0:format=yuv420[final]" \
              -map "[final]" \
              -map 2:a \
              -c:v libx264 -preset medium -crf 23 -pix_fmt yuv420p \
              -c:a aac -b:a 192k -ar 44100 \
              -movflags +faststart \
              -t "$DURATION" \
              output.mp4 2>/tmp/r2.log

            if [ $? -eq 0 ] && [ -s "output.mp4" ]; then
              RENDER_OK="true"
              echo "   ✅ KB + Fondo exitoso"
            else
              echo "   ⚠️ Fallo"
              tail -5 /tmp/r2.log 2>/dev/null || true
            fi
          fi

          # ═══════════════════════════════════════════════════
          # INTENTO 3: Solo Ken Burns + Audio + Subs
          # ═══════════════════════════════════════════════════
          if [ "$RENDER_OK" = "false" ] && [ "${{ env.HAS_KB }}" = "true" ] && [ -s "ken_burns.mp4" ]; then
            echo ""
            echo "🎥 INTENTO 3: Solo KB + Audio + Subs"

            ffmpeg -y \
              -i ken_burns.mp4 \
              -i audio.wav \
              -filter_complex "\
                [0:v]ass=subtitles.ass[final]" \
              -map "[final]" \
              -map 1:a \
              -c:v libx264 -preset medium -crf 23 -pix_fmt yuv420p \
              -c:a aac -b:a 192k -ar 44100 \
              -movflags +faststart \
              -t "$DURATION" \
              output.mp4 2>/tmp/r3.log

            if [ $? -eq 0 ] && [ -s "output.mp4" ]; then
              RENDER_OK="true"
              echo "   ✅ KB + Audio exitoso"
            else
              echo "   ⚠️ Fallo"
              tail -5 /tmp/r3.log 2>/dev/null || true
            fi
          fi

          # ═══════════════════════════════════════════════════
          # INTENTO 4: Solo Ken Burns + Audio (sin subs)
          # ═══════════════════════════════════════════════════
          if [ "$RENDER_OK" = "false" ] && [ "${{ env.HAS_KB }}" = "true" ] && [ -s "ken_burns.mp4" ]; then
            echo ""
            echo "🎥 INTENTO 4: Solo KB + Audio"

            ffmpeg -y \
              -i ken_burns.mp4 \
              -i audio.wav \
              -c:v libx264 -preset medium -crf 23 -pix_fmt yuv420p \
              -c:a aac -b:a 192k -ar 44100 \
              -movflags +faststart \
              -t "$DURATION" \
              output.mp4 2>/dev/null

            if [ $? -eq 0 ] && [ -s "output.mp4" ]; then
              RENDER_OK="true"
              echo "   ✅ KB basico exitoso"
            fi
          fi

          # ═══════════════════════════════════════════════════
          # INTENTO 5: Fondo + Audio (sin imagen)
          # ═══════════════════════════════════════════════════
          if [ "$RENDER_OK" = "false" ]; then
            echo ""
            echo "🎥 INTENTO 5: Fondo + Audio basico"

            ffmpeg -y \
              -stream_loop -1 -i background_original.mp4 \
              -i audio.wav \
              -filter_complex \
              "[0:v]scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920[final]" \
              -map "[final]" -map 1:a \
              -c:v libx264 -preset ultrafast -crf 25 -pix_fmt yuv420p \
              -c:a aac -b:a 192k \
              -t "$DURATION" \
              output.mp4 2>/dev/null

            if [ $? -eq 0 ] && [ -s "output.mp4" ]; then
              RENDER_OK="true"
              echo "   ✅ Basico exitoso"
            fi
          fi

          # ═══════════════════════════════════════════════════
          # INTENTO 6: Emergencia total
          # ═══════════════════════════════════════════════════
          if [ "$RENDER_OK" = "false" ]; then
            echo ""
            echo "🎥 INTENTO 6: Emergencia"
            ffmpeg -y \
              -f lavfi -i "color=c=black:s=1080x1920:d=${DURATION}:r=30" \
              -i audio.wav \
              -c:v libx264 -preset ultrafast -crf 28 -pix_fmt yuv420p \
              -c:a aac -b:a 128k \
              -t "$DURATION" -shortest \
              output.mp4 2>/dev/null || true
          fi

          echo ""
          if [ -s "output.mp4" ]; then
            SIZE=$(du -h output.mp4 | cut -f1)
            echo "═══════════════════════════════════"
            echo "✅ VIDEO RENDERIZADO: $SIZE"
            echo "═══════════════════════════════════"
          else
            echo "❌ No se genero video"
            exit 1
          fi

      - name: Upload Video
        id: upload
        run: |
          echo "📤 Subiendo video..."
          VIDEO_URL=""
          for i in 1 2 3; do
            echo "   Intento $i/3..."
            URL=$(curl -f -A "Mozilla/5.0" --connect-timeout 30 --max-time 300 \
              -F "reqtype=fileupload" -F "time=24h" -F "fileToUpload=@output.mp4" \
              "https://litterbox.catbox.moe/resources/internals/api.php" 2>/dev/null || echo "")
            if echo "$URL" | grep -q "^https://"; then
              VIDEO_URL="$URL"
              echo "   ✅ $VIDEO_URL"
              break
            fi
            sleep 10
          done
          if [ -n "$VIDEO_URL" ]; then
            echo "video_url=$VIDEO_URL" >> $GITHUB_OUTPUT
          else
            echo "video_url=UPLOAD_FAILED" >> $GITHUB_OUTPUT
          fi

      - name: Upload Artifact Backup
        if: steps.upload.outputs.video_url == 'UPLOAD_FAILED'
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: output.mp4
          retention-days: 1

      - name: Send Webhook
        if: always()
        run: |
          WEBHOOK_URL="${{ secrets.WEBHOOK_URL }}"
          if [ -z "$WEBHOOK_URL" ]; then
            echo "⚠️ No hay webhook"
            exit 0
          fi
          VIDEO_RESULT="${{ steps.upload.outputs.video_url }}"
          if [ "$VIDEO_RESULT" != "UPLOAD_FAILED" ] && [ -n "$VIDEO_RESULT" ]; then
            STATUS="completed"
          else
            STATUS="failed"
          fi
          curl -sf -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"$STATUS\",\"video_url\":\"$VIDEO_RESULT\"}" 2>/dev/null || true
