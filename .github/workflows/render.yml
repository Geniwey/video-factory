name: Render Short Video

on:
  repository_dispatch:
    types: [render-video]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Verify environment
        run: |
          echo "FFmpeg: $(ffmpeg -version 2>&1 | head -1)"
          echo "Python: $(python3 --version)"
          echo "Disk: $(df -h / | tail -1 | awk '{print $4}') free"
          echo "RAM: $(free -h | grep Mem | awk '{print $2}')"
          echo "✅ Environment OK"

  render:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: ~/.cache/whisper
          key: whisper-small-v3

      - name: Install dependencies
        run: |
          pip install openai-whisper edge-tts
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg bc
          
          mkdir -p ~/.fonts
          wget -q -O ~/.fonts/Montserrat-Black.ttf \
            "https://github.com/JulietaUla/Montserrat/raw/master/fonts/ttf/Montserrat-Black.ttf"
          fc-cache -f
          echo "✅ Dependencias instaladas"

      # ── Descargar con retry ──
      - name: Download assets
        run: |
          download() {
            local url="$1" output="$2" attempt=1
            while [ $attempt -le 3 ]; do
              echo "📥 $output (intento $attempt/3)..."
              if curl -L -f --connect-timeout 30 --max-time 120 \
                --retry 2 --retry-delay 5 -o "$output" "$url"; then
                local size=$(stat --printf="%s" "$output" 2>/dev/null || echo "0")
                if [ "$size" -gt 1000 ]; then
                  echo "✅ $output ($(du -h "$output" | cut -f1))"
                  return 0
                fi
              fi
              echo "⚠️ Reintentando en $((attempt * 10))s..."
              sleep $((attempt * 10))
              attempt=$((attempt + 1))
            done
            echo "❌ Falló: $output"
            return 1
          }
          
          download "${{ github.event.client_payload.audio_url }}" "audio.wav" || true
          download "${{ github.event.client_payload.video_url }}" "background.mp4"
          download "${{ github.event.client_payload.image_url }}" "overlay.png"

      # ── TTS fallback si el audio no se descargó ──
      - name: TTS fallback
        if: hashFiles('audio.wav') == '' || ! test -s audio.wav
        run: |
          echo "⚠️ Audio no disponible. Generando con Edge-TTS..."
          echo '${{ github.event.client_payload.script_text }}' > script.txt
          edge-tts \
            --voice "es-ES-AlvaroNeural" \
            --rate "+5%" \
            --pitch "-3Hz" \
            --file script.txt \
            --write-media audio.wav
          echo "✅ Audio generado con Edge-TTS"

      # ── Whisper ──
      - name: Transcribe
        run: |
          echo "🎙 Transcribiendo con Whisper small..."
          whisper audio.wav \
            --model small \
            --language ${{ github.event.client_payload.language || 'es' }} \
            --output_format json \
            --word_timestamps True \
            --output_dir .
          echo "✅ Transcripción completada"

      # ── Subtítulos ──
      - name: Generate subtitles
        run: python generate_subs.py

      # ── Validar subtítulos ──
      - name: Validate subtitles
        run: |
          COUNT=$(grep -c "^Dialogue:" subtitles.ass || echo "0")
          echo "Líneas de diálogo: $COUNT"
          if [ "$COUNT" -lt 3 ]; then
            echo "⚠️ Pocos subtítulos. Regenerando con fallback..."
            python3 << 'PYEOF'
          import json
          try:
              with open('audio.json') as f:
                  data = json.load(f)
              segs = data.get('segments', [])
          except:
              segs = [{"start":0,"end":50,"text":"..."}]
          
          ass = """[Script Info]
          Title: Fallback
          ScriptType: v4.00+
          PlayResX: 1080
          PlayResY: 1920
          [V4+ Styles]
          Format: Name,Fontname,Fontsize,PrimaryColour,SecondaryColour,OutlineColour,BackColour,Bold,Italic,Underline,StrikeOut,ScaleX,ScaleY,Spacing,Angle,BorderStyle,Outline,Shadow,Alignment,MarginL,MarginR,MarginV,Encoding
          Style: Default,Montserrat Black,80,&H00FFFFFF,&H0000D7FF,&H00000000,&HBB000000,-1,0,0,0,100,100,0,0,1,4,2,2,60,60,538,1
          [Events]
          Format: Layer,Start,End,Style,Name,MarginL,MarginR,MarginV,Effect,Text
          """
          for s in segs:
              t=s.get('text','').strip().upper()
              if not t: continue
              st,en=s['start'],s['end']
              sf=f"{int(st//3600)}:{int(st%3600//60):02d}:{int(st%60):02d}.{int(st%1*100):02d}"
              ef=f"{int(en//3600)}:{int(en%3600//60):02d}:{int(en%60):02d}.{int(en%1*100):02d}"
              ass+=f"Dialogue: 0,{sf},{ef},Default,,0,0,0,,{t}\n"
          with open('subtitles.ass','w') as f: f.write(ass)
          PYEOF
          fi
          echo "✅ Subtítulos listos"

      # ── Render FFmpeg ──
      - name: Render video
        run: |
          chmod +x render.sh
          bash render.sh

      # ── Upload con fallback ──
      - name: Upload result
        id: upload
        run: |
          for i in 1 2 3; do
            echo "📤 Litterbox (intento $i/3)..."
            URL=$(curl -f --max-time 180 \
              -F "reqtype=fileupload" \
              -F "time=24h" \
              -F "fileToUpload=@output.mp4" \
              https://litterbox.catbox.moe/resources/internals/api.php 2>/dev/null) \
              && echo "$URL" | grep -q "^https://" \
              && { echo "video_url=$URL" >> $GITHUB_OUTPUT; echo "✅ $URL"; exit 0; }
            sleep 15
          done
          
          echo "📤 Fallback: Catbox permanente..."
          URL=$(curl -f --max-time 300 \
            -F "reqtype=fileupload" \
            -F "fileToUpload=@output.mp4" \
            https://catbox.moe/user/api.php 2>/dev/null)
          
          if echo "$URL" | grep -q "^https://"; then
            echo "video_url=$URL" >> $GITHUB_OUTPUT
            echo "✅ $URL"
          else
            echo "❌ Ambos servicios fallaron"
            exit 1
          fi

      # ── Webhook de vuelta ──
      - name: Notify Activepieces
        if: always()
        run: |
          if [ -n "${{ steps.upload.outputs.video_url }}" ]; then
            STATUS="completed"
            PAYLOAD="{\"status\":\"$STATUS\",\"video_url\":\"${{ steps.upload.outputs.video_url }}\",\"title\":\"${{ github.event.client_payload.title }}\",\"description\":\"${{ github.event.client_payload.description }}\"}"
          else
            STATUS="failed"
            PAYLOAD="{\"status\":\"$STATUS\",\"error\":\"Render o upload falló\"}"
          fi
          
          curl -sf -X POST "${{ secrets.WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            && echo "✅ Webhook enviado ($STATUS)" \
            || echo "⚠️ Webhook falló"
